datasets:
  - metadata:
      dataset_identifier: 10491
      dataset_title: >-
        CryoSiam chromatin training dataset - simulated cryo-electron tomograms of nucleosome arrays and DNA filaments
      dataset_description: >-
        Synthetic cryo-electron tomography dataset comprising 50 simulated tomograms
        of chromatin-like content, generated for the CryoSiam framework (Stojanovska
        et al., bioRxiv 2025.11.11.687379). Each tomogram is populated with mono-,
        di-, tri- and tetra-nucleosome arrays (including H1-bound 4x177, 4x197 and
        4x207 arrays; PDBs 5F99, 7PEY, 7PEW, 7PEX, 5OXV, 1ZBB, 6M3V, 6LA8, 6L4A, 6L49,
        7PEV, 7PEU, 7PF0, 7VA4, 7V9K, 7PFT, 5OY7, 7PFA, 7PET) together with short DNA
        filaments (50, 100, 150, 200, 250, 300, 350, 400, 450, 500, 1000 bp;
        persistence lengths 5, 6, 8, 10, 20 bp) generated via the wormlike-chain (WLC)
        model with PolymerCpp and converted to PDB before insertion. Sample
        thicknesses range 35-100 nm; this subset mimics a less crowded environment
        resembling isolated biomolecular assemblies. For each run the deposit contains
        a clean and a noisy CTF-modulated tilt series (300 kV, 6.8 Å/pixel,
        tilt range -60° to +60° in 2° increments, 61 tilts, 120 e-/Å² total dose,
        2-5 µm defocus, amplitude contrast 2.7, Gaussian noise σ = 0.2),
        reconstructed via WBP (IMOD) into clean, noisy, CTF-corrected (phase-flipped)
        and CryoSiam-denoised tomograms (XY 600x600, variable Z), with voxel-wise
        semantic masks (background, membranes, particles=nucleosomes, DNA/RNA
        filaments) and a fine 149-class semantic mask (corresponding samples in the
        paper: sample_351-sample_400). Full list of PDB structures used by the
        simulator is in gts/semantic_classes_ids.dat and Supplementary Table 2 of
        the source publication; cross_references.related_database_entries lists
        only a representative subset.
      sample_type: in_silico
      assay:
        name: microscopy assay
        id: EFO:0002909
      development_stage:
        name: unknown
        id: unknown
      disease:
        name: normal
        id: PATO:0000461
      authors: *id_authors
      funding: &id_funding
        - funding_agency_name: Independent Research Fund Denmark
          grant_id: 0164-00010A
        - funding_agency_name: European Commission, Horizon 2020 (Marie Skłodowska-Curie Actions, ARISE fellowship)
          grant_id: "945405"
        - funding_agency_name: European Molecular Biology Laboratory
          grant_id: EMBL core funding
        - funding_agency_name: European Molecular Biology Laboratory
          grant_id: EMBL Infection Biology Transversal Theme Synergy grant
        - funding_agency_name: Chan Zuckerberg Initiative
          grant_id: 2021-234620
      cross_references: &id_cross_references
        publications: 10.1101/2025.11.11.687379
        # Representative subset of the deposition's ~141 PDB-derived structures.
        # For chromatin, the nucleosome PDB family (5F99, 5OXV, 5OY7, 1ZBB, 6M3V,
        # 6LA8, 6L4A, 6L49, 7PEY, 7PEW, 7PEX, 7PEV, 7PEU, 7PFA, 7PET, 7PF0, 7PFT,
        # 7VA4, 7V9K) is enumerated in dataset_description / sample_preparation.
        # Full list in gts/semantic_classes_ids.dat and Supp. Table 2.
        related_database_entries: >-
          EMPIAR-10499, EMPIAR-11756,
          PDB-1BXN, PDB-1MWS, PDB-1SS8, PDB-1ZBB, PDB-2CG9, PDB-2Q0U,
          PDB-4CR2, PDB-4UJD, PDB-4V4R, PDB-4V5C, PDB-5FMG, PDB-5OOL,
          PDB-5OXV, PDB-6KS8, PDB-6X9Q, PDB-7PEY
        related_database_links: >-
          https://github.com/frosinastojanovska/cryosiam,
          https://github.com/frosinastojanovska/cryosiam_vis,
          https://cryoetdataportal.czscience.com/datasets/10003,
          https://cryoetdataportal.czscience.com/datasets/10301
      dates: *id_dates
      grid_preparation: >-
        Not applicable - purely synthetic dataset generated in silico via the
        cryo-TomoSim (CTS) simulator. No physical grid preparation was performed.
      sample_preparation: >-
        Tomograms were simulated with cryo-TomoSim (CTS; Purnell et al., bioRxiv
        2023.04.28.538636), generating 50 synthetic 'chromatin' tomograms. The
        chromatin sample is composed of nucleosome structures and DNA filaments.
        Nucleosome species deposited as PDB-derived input include MMTV-A core particle
        (5F99); H1-containing 4x177 nucleosome arrays (5OXV, 7PEY, 7PEW, 7PEX, 7PEV,
        7PEU, 7PFA, 7PET) and tri-nucleosomes from those arrays (7PF0);
        tetranucleosomes 5OY7 and 1ZBB; tri-/di-nucleosomes 6M3V, 6LA8, 6L4A, 6L49;
        H1-containing 4x197 and 4x207 trinucleosomes (7PFT and others); and telomeric
        tetranucleosomes (7VA4, 7V9K). DNA filaments were generated with the
        PolymerCpp software (Stefko, Douglass & Manley, Zenodo 2020,
        doi:10.5281/zenodo.3928659) using the wormlike-chain (WLC) model: filament
        path lengths of 50, 100, 150, 200, 250, 300, 350, 400, 450, 500, and 1000
        base pairs at persistence lengths of 5, 6, 8, 10, and 20 base pairs (one
        synthetic class per length×persistence combination). The 3D conformations
        were converted to PDB and incorporated into the CTS simulations alongside
        nucleosomes. Particles were placed largest-to-smallest with brute-force model
        filling. Sample thicknesses ranged 35-100 nm. Each 3D model was projected into
        a CTF-modulated synthetic tilt series (acquisition parameters in tiltseries
        metadata). Clean and noisy/CTF-modulated tilt series
        were independently reconstructed via weighted back-projection (WBP) in IMOD.
        Tomogram XY dimensions are 600x600 voxels; Z varies per run.
      other_setup: In silico simulation (CTS pipeline; CryoETSim chromatin subset)
    sources:
      - literal:
          value:
            - "10491"

