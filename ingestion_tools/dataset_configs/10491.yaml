dataset_keyphotos:
  - sources:
      - literal:
          value:
            snapshot: null
            thumbnail: null

datasets:
  - metadata:
      dataset_identifier: 10491
      dataset_title: >-
        CryoETSim chromatin subset - simulated cryo-electron tomograms of nucleosome arrays and DNA filaments
      dataset_description: >-
        Synthetic cryo-electron tomography dataset of 50 simulated tomograms of
        chromatin-like content, generated for the CryoSiam self-supervised
        representation-learning framework (Stojanovska et al., bioRxiv
        2025.11.11.687379). The cryo-TomoSim (CTS) simulator was populated with
        mono-, di-, tri- and tetra-nucleosome arrays (including H1-bound
        4x177/4x197/4x207 arrays and telomeric tetranucleosomes) plus short DNA
        filaments (50-1000 bp, persistence 5-20 bp) generated by PolymerCpp using a
        wormlike-chain model; this less-crowded scene resembles isolated
        biomolecular assemblies. Sample thicknesses span 35-100 nm. Each run
        provides four reconstructed tomogram variants and voxel-wise ground-truth
        semantic masks. The nucleosome structures used are enumerated in the
        publication's Supplementary Table 2.
      sample_type: in_silico
      assay:
        name: microscopy assay
        id: EFO:0002909
      development_stage:
        name: unknown
        id: unknown
      disease:
        name: normal
        id: PATO:0000461
      authors: *id_authors
      funding:
        - funding_agency_name: Independent Research Fund Denmark
          grant_id: 0164-00010A
        - funding_agency_name: European Commission, Horizon 2020 (Marie Skłodowska-Curie Actions, ARISE fellowship)
          grant_id: "945405"
        - funding_agency_name: European Molecular Biology Laboratory
          grant_id: EMBL core funding
        - funding_agency_name: European Molecular Biology Laboratory
          grant_id: EMBL Infection Biology Transversal Theme Synergy grant
        - funding_agency_name: Chan Zuckerberg Initiative
          grant_id: 2021-234620
      cross_references:
        publications: 10.1101/2025.11.11.687379
        related_database_entries: >-
          EMPIAR-10499, EMPIAR-11756, PDB-5F99, PDB-1ZBB, PDB-5OXV, PDB-5OY7,
          PDB-6M3V, PDB-6LA8, PDB-6L4A, PDB-6L49, PDB-7PET, PDB-7PEU, PDB-7PEV,
          PDB-7PEW, PDB-7PEX, PDB-7PEY, PDB-7PF0, PDB-7PFA, PDB-7PFT, PDB-7VA4,
          PDB-7V9K
        related_database_links: >-
          https://github.com/frosinastojanovska/cryosiam,
          https://github.com/frosinastojanovska/cryosiam_vis,
          https://cryoetdataportal.czscience.com/datasets/10003,
          https://cryoetdataportal.czscience.com/datasets/10301
      dates: *id_dates
      grid_preparation: >-
        Not applicable - purely synthetic dataset generated in silico via the
        cryo-TomoSim (CTS) simulator. No physical grid preparation was performed.
      sample_preparation: >-
        Tomograms were simulated with cryo-TomoSim (CTS; Purnell et al., bioRxiv
        2023.04.28.538636), producing 50 'chromatin' synthetic volumes. Each was
        populated with nucleosome species - mono-, di-, tri- and tetra-nucleosomes,
        including H1-bound 4x177/4x197/4x207 arrays and telomeric tetranucleosomes
        (structures enumerated in Supplementary Table 2) - together with short DNA
        filaments generated by PolymerCpp (Stefko, Douglass & Manley, Zenodo 2020,
        doi:10.5281/zenodo.3928659) using a wormlike-chain model: lengths 50-1000 bp
        at persistence lengths 5-20 bp, converted to PDB and inserted into CTS.
        Particles were placed largest-to-smallest by brute-force model filling;
        sample thicknesses ranged 35-100 nm. Clean and CTF-modulated synthetic tilt
        series were independently reconstructed by weighted back-projection (IMOD)
        into tomograms (XY 600x600 voxels, variable Z).
      other_setup: In silico simulation (CTS pipeline; CryoETSim chromatin subset)
    sources:
      - literal:
          value:
            - "10491"

depositions:
  - sources:
      - literal:
          value:
            - 10348

frames:
  - metadata:
      dose_rate: 1.967
      is_gain_corrected: true
    sources:
      - literal:
          value:
            - default

rawtilts:
  - sources:
      - source_glob:
          list_glob: tilt_angles_corrected/{run_name}.rawtlt

runs:
  - sources:
      - source_glob:
