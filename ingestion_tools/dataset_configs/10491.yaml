  - metadata:
      annotation_ingest_id: cryosiam-semantic-149class-1
      annotation_object:
        id: GO:0110165
        name: cellular anatomical structure
        description: >-
          Fine-grained 149-class semantic mask. Per-voxel integer label encoding every
          individual macromolecular structure type used by the simulator. Class index
          N (1..149) corresponds to the N-th line of gts/semantic_classes_ids.dat.
          Label 0 = background. Includes ~141 PDB-derived macromolecules (e.g. fix_4UJD
          = mammalian 80S ribosome, fix_5OOL = human mitochondrial ribosome, fix_5FMG
          = proteasome, fix_4CR2 = 26S proteasome, fix_2CG9 = Hsp90-Sba1, fix_1SS8 =
          GroEL, fix_6KS8 = TRiC, fix_1BXN = rubisco), cytoskeletal filaments
          (actin_long, actin_cofilactin, MT_6o2tx2, neuroMT), 50 DNA-filament
          length/persistence variants, and ligand-gated/membrane receptors.
      annotation_method: >-
        Per-voxel ground-truth fine-grained semantic mask emitted by CTS; the modified
        CTS code records the class index of every PDB-derived particle in addition to
        the 5-class general semantic mask.
      annotation_software: cryo-TomoSim (CTS); PolymerCpp
      annotation_publications: 10.1101/2025.11.11.687379
      method_type: simulated
      ground_truth_status: true
      version: 1.0
