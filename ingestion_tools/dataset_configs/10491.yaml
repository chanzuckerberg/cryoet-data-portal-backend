depositions:
  - metadata:
      deposition_identifier: 10348
      deposition_title: >-
        CryoETSim: simulated cryo-electron tomograms for self-supervised
        representation learning with the CryoSiam framework
      deposition_description: >-
        The CryoETSim deposition provides 400 simulated cryo-electron tomograms
        generated with the cryo-TomoSim (CTS) simulator to systematically model
        defocus variation, sample thickness, and molecular crowding characteristic
        of experimental cryo-ET data. The deposition is split across three scenes:
        a general macromolecular crowding scene (300 runs spanning ~150 macromolecular
        complexes, cytoskeletal filaments, membrane proteins, and small distractor
        proteins), a chromatin scene (50 runs of DNA filaments with nucleosomes,
        sampling a wide range of contour lengths and persistence lengths), and a
        minimal-bacterium scene (50 runs containing DNA filaments,
        transcription/translation complexes such as 70S ribosomes and RNA polymerase
        expressomes, membrane proteins, and small distractors). Tomograms are
        simulated at 600x600 voxels in XY with variable Z, 6.8 Å/voxel, 300 kV,
        ±60° tilt range with 2° steps using a dose-symmetric scheme, and ~120
        e-/Å² total dose. For every simulated run, four tomogram variants are
        provided - clean (noise-free ground truth), noisy (noise + CTF), noisy with
        CTF-corrected phase flipping, and a CryoSiam-denoised version - together
        with paired voxel-level ground-truth annotations: a coarse 5-class semantic
        mask (background, membranes, particles, microtubules, actin, DNA/RNA
        filaments) and a fine 149-class semantic mask that resolves individual
        particle identities. The general scene additionally includes per-particle
        instance masks with coordinate and volume metadata. Full PDB list in
        Supplementary Table 2 of the source publication.
      deposition_types:
        - dataset
      authors: *id_authors
      cross_references: *id_cross_references
      dates: *id_dates
    sources:
      - literal:
          value:
            - 10348

