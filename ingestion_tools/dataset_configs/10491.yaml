annotations:
  - metadata:
      annotation_ingest_id: cryosiam-semantic-general-particles-1
      annotation_object:
        id: GO:0000786
        name: nucleosome
        description: >-
          Nucleosome assemblies (mono-, di-, tri-, tetra-nucleosomes including H1-bound 4x177/4x197/4x207 arrays). For the chromatin subset, label 2 in the semantic_general mask exclusively encodes nucleosome PDBs (5F99, 7PEY, 7PEW, 7PEX, 5OXV, 1ZBB, 6M3V, 6LA8, 6L4A, 6L49, 7PEV, 7PEU, 7PF0, 7VA4, 7V9K, 7PFT, 5OY7, 7PFA, 7PET).
      annotation_method: >-
        Per-voxel ground-truth semantic mask emitted by the CTS (cryo-TomoSim) simulator
        alongside the tomogram. Voxel value 2 marks nucleosome voxels in the multi-label
        semantic_general MRC (channel index 2 in
        gts/semantic_general_classes_ids.dat). Voxel value 0 is background.
      annotation_software: cryo-TomoSim (CTS)
      annotation_publications: 10.1101/2025.11.11.687379
