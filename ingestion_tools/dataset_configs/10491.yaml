      annotation_ingest_id: cryosiam-semantic-general-dna-rna-filaments-1
      annotation_object:
        id: GO:0000785
        name: chromatin
        description: >-
          Combined DNA/RNA filament label (wormlike-chain DNA filaments and RNA densities from transcription/translation complexes); broader than the GO chromatin term.
