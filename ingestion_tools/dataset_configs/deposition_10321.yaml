depositions:
- metadata:
    authors: *id001
    dates: *id002
    deposition_description: "The 3rd place solution implements an ensemble of 3D UNet\
      \ models with ResNet101 backbone, trained using Cross Entropy loss on all seven\
      \ particle classes including the non-scored beta-amylase. Training utilizes\
      \ smaller input dimensions (64\xD7128\xD7128) while inference benefits from\
      \ larger dimensions (64\xD7256\xD7256), coupled with Exponential Moving Average\
      \ (EMA) with a decay of 0.995 for model stabilization. The final submission\
      \ consists of a 4-fold average ensemble (from 7-fold cross-validation) with\
      \ test-time augmentation including flips along x, y, z axes and 90-degree rotations\
      \ in the x-y plane."
    deposition_identifier: 10321
    deposition_title: CZII CryoET Object Identification Challenge - 3rd place solution
      - ONCE UPON A MOON
    deposition_types:
    - annotation
    tag: competitionML2024Winners
  sources:
  - literal:
      value:
      - 10321
