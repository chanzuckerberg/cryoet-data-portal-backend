      dataset_identifier: 10506
      dataset_title: Cryo-ET tomograms of Rickettsia parkeri ompBSTOP::tn in infected A549 cells (UC Berkeley K2)
      dataset_description: |
        Cryo-electron tomograms of Rickettsia parkeri ompBSTOP::tn (ompB-null transposon mutant, strain Portsmouth)
        imaged within infected A549 human lung epithelial host cells (sample 22Oct12_OmpB, collected October 2022).
        This is the older UC Berkeley CalCryo dataset acquired on a Titan Krios with a K2 detector and Gatan energy
        filter (~3.36 A pixel, bidirectional tilt scheme), corresponding to the ompB-mutant infected-cell panel of
        the publication. Only tomograms are deposited for this dataset (no tilt series or mdoc files). The
        paracrystalline S-layer is absent in this ompB mutant.
      cross_references:
        publications: 10.17912/micropub.biology.002219
      assay:
        name: microscopy assay
        id: EFO:0002909
      organism:
        name: Rickettsia parkeri
        taxonomy_id: 35792
      sample_type: primary_cell_culture
      cell_type:
        name: prokaryotic cell
        id: CL:0000520
      cell_strain:
        name: Rickettsia parkeri str. Portsmouth
        id: NCBITaxon:1105108
      cell_component:
        name: outer membrane
        id: GO:0019867
      tissue:
        name: prokaryotic cell
        id: CL:0000520
      development_stage:
        name: unknown
        id: unknown
      disease:
        name: normal
        id: PATO:0000461
      grid_preparation: |
        Holey-carbon grids (Quantifoil R2/1 200 mesh gold) were primed with poly-L-lysine; A549 host cells were grown
        on the grids and infected with R. parkeri (MOI 1-10, 24 h at 33 C). Grids were permeabilized/fixed with Triton
        X-100 + glutaraldehyde in cytoskeleton buffer, then phalloidin + glutaraldehyde. 10 nm gold beads were applied
        as fiducials for tomogram reconstruction, and grids were plunge-frozen in liquid ethane on a Leica EM GP2 and
        stored in liquid nitrogen. (Grid-prep details inferred from the infected-cell protocol; confirm for this older
        2022 dataset.)
      sample_preparation: |
        Rickettsia parkeri strain Portsmouth was obtained from C. Paddock (CDC). The ompBSTOP::tn transposon-insertion
        (ompB-null) mutant is from Engstrom et al. 2019. Bacteria were propagated by infecting confluent Vero cells
        (ATCC CCL-81, CVCL_0059), harvested, Dounce-homogenized in K36 buffer, isolated by 30% RenoCal-76 density
        centrifugation, resuspended in BHI medium and stored at -80 C as a 30% prep stock. A549 human lung epithelial
        cells (ATCC CRM-CCL-185, CVCL_0023) were used as host cells for in-cell imaging.
      other_setup: |
        Whole-cell cryo-ET of intracellular R. parkeri ompBSTOP::tn mutant in A549 host cells (UC Berkeley K2, Oct 2022).
