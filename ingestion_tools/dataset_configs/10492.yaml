datasets:
  - metadata:
      dataset_identifier: 10492
      dataset_title: >-
        CryoETSim minimal-bacterium subset - simulated cryo-electron tomograms of bacterial transcription/translation
      dataset_description: >-
        Synthetic cryo-electron tomography dataset of 50 simulated tomograms
        representing a minimal-bacterium cellular volume, generated for the CryoSiam
        self-supervised representation-learning framework (Stojanovska et al.,
        bioRxiv 2025.11.11.687379). The cryo-TomoSim (CTS) simulator was populated
        with bacterial 70S ribosomes and 50S/30S subunits, RNA polymerase, membrane
        and receptor complexes, smaller cytosolic distractor proteins, and
        PolymerCpp wormlike-chain DNA filaments (50-1000 bp, persistence 5-20 bp).
        Sample thicknesses span 35-100 nm. The content emulates a minimal bacterium;
        the model trained on this subset is later applied to experimental Mycoplasma
        pneumoniae tomograms (EMPIAR-10499), though the simulated runs are not
        modeled as any specific organism. Each run provides four reconstructed
        tomogram variants and voxel-wise ground-truth semantic masks. The structures
        used are enumerated in the publication's Supplementary Table 2.
      sample_type: in_silico
      assay:
        name: microscopy assay
        id: EFO:0002909
      development_stage:
        name: unknown
        id: unknown
      disease:
        name: normal
        id: PATO:0000461
      authors: *id_authors
      funding:
        - funding_agency_name: Independent Research Fund Denmark
          grant_id: 0164-00010A
        - funding_agency_name: European Commission, Horizon 2020 (Marie Skłodowska-Curie Actions, ARISE fellowship)
          grant_id: "945405"
        - funding_agency_name: European Molecular Biology Laboratory
          grant_id: EMBL core funding
        - funding_agency_name: European Molecular Biology Laboratory
          grant_id: EMBL Infection Biology Transversal Theme Synergy grant
        - funding_agency_name: Chan Zuckerberg Initiative
          grant_id: 2021-234620
      cross_references:
        publications: 10.1101/2025.11.11.687379
        related_database_entries: >-
          EMPIAR-10499,
          PDB-4V4R, PDB-4V5C, PDB-4V5D, PDB-4V5F, PDB-4V5G, PDB-7P6Z,
          PDB-7PAT, PDB-7OOC, PDB-1I94, PDB-4YG2,
          PDB-6HIS, PDB-6LFM, PDB-6N52, PDB-5SOA,
          PDB-12GS, PDB-1EXR, PDB-1QTX, PDB-2Q0U, PDB-1SJJ
        related_database_links: >-
          https://github.com/frosinastojanovska/cryosiam,
          https://github.com/frosinastojanovska/cryosiam_vis,
          https://cryoetdataportal.czscience.com/datasets/10003
      dates: *id_dates
      grid_preparation: >-
        Not applicable - purely synthetic dataset generated in silico via the
        cryo-TomoSim (CTS) simulator. No physical grid preparation was performed.
      sample_preparation: >-
        Tomograms were simulated with cryo-TomoSim (CTS; Purnell et al., bioRxiv
        2023.04.28.538636), producing 50 'minimal_bacterium' synthetic volumes. Each
        was populated with bacterial 70S ribosomes (e.g. Thermus thermophilus
        4V4R/4V5C/4V5D/4V5F/4V5G and Mycoplasma pneumoniae 7P6Z), isolated 50S (7PAT)
        and 30S (7OOC, 1I94) subunits, RNA polymerase (the generic rnap class plus
        the E. coli sigma70 holoenzyme 4YG2), membrane and receptor complexes (5-HT3
        receptor 6HIS, class A GPCR 6LFM, mGluR5 6N52), cytosolic distractor proteins
        (the FabF mutant 5SOA, glutathione S-transferase 12GS, calmodulin 1EXR/1QTX,
        actin 2Q0U, alpha-actinin 1SJJ), and PolymerCpp wormlike-chain DNA filaments
        (50-1000 bp, persistence 5-20 bp). Particles were placed largest-to-smallest
        by brute-force model filling up to ~80% crowding; sample thicknesses ranged
        35-100 nm. Clean and CTF-modulated synthetic tilt series were independently
        reconstructed by weighted back-projection (IMOD) into tomograms (XY 600x600
        voxels, variable Z).
      other_setup: In silico simulation (CTS pipeline; CryoETSim minimal-bacterium subset)
    sources:
      - literal:
          value:
            - "10492"

