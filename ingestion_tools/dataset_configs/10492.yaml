datasets:
  - metadata:
      dataset_identifier: 10492
      dataset_title: >-
        CryoSiam minimal-bacterium training dataset - simulated cryo-electron tomograms of bacterial transcription/translation machineries
      dataset_description: >-
        Synthetic cryo-electron tomography dataset comprising 50 simulated tomograms
        representing a minimal-bacterium cellular volume, generated for the CryoSiam
        framework (Stojanovska et al., bioRxiv 2025.11.11.687379). Each tomogram
        contains complete 70S ribosomes, large (50S) and small (30S) ribosomal
        subunits, bacterial RNA polymerase, transcription-translation complexes and
        expressomes, membranous vesicles, membrane-embedded complexes (S-layers, BAM,
        GPCRs, ligand-gated ion channels), smaller cytosolic complexes serving as
        distractors, and simulated DNA filaments (50-1000 bp, persistence 5-20 bp;
        wormlike-chain model). Sample thicknesses range 35-100 nm. The simulated
        content emulates the molecular composition of a minimal bacterium (bacterial
        ribosomes and RNAP); the model trained on this subset is later applied
        directly to experimental Mycoplasma pneumoniae tomograms (EMPIAR-10499,
        DS-10003) as described in the source publication, but the simulated runs are
        not modeled as any specific organism. For each run the deposit contains a
        clean and a noisy CTF-modulated tilt series (300 kV, 6.8 Å/pixel, tilt
        range -60° to +60° in 2° increments, 61 tilts, 120 e-/Å² total dose,
        2-5 µm defocus, amplitude contrast 2.7, Gaussian noise σ = 0.2),
        reconstructed via WBP (IMOD) into clean, noisy, CTF-corrected (phase-flipped)
        and CryoSiam-denoised tomograms (XY 600x600, variable Z), with voxel-wise
        semantic masks (background, membranes, particles, DNA/RNA filaments) and a
        fine 149-class semantic mask (corresponding samples in the paper:
        sample_301-sample_350). Full list of PDB structures used by the simulator
        is in gts/semantic_classes_ids.dat and Supplementary Table 2 of the source
        publication; cross_references.related_database_entries lists only a
        representative subset.
      sample_type: in_silico
      assay:
        name: microscopy assay
        id: EFO:0002909
      development_stage:
        name: unknown
        id: unknown
      disease:
        name: normal
        id: PATO:0000461
      authors: *id_authors
      funding: &id_funding
        - funding_agency_name: Independent Research Fund Denmark
          grant_id: 0164-00010A
        - funding_agency_name: European Commission, Horizon 2020 (Marie Skłodowska-Curie Actions, ARISE fellowship)
          grant_id: "945405"
        - funding_agency_name: European Molecular Biology Laboratory
          grant_id: EMBL core funding
        - funding_agency_name: European Molecular Biology Laboratory
          grant_id: EMBL Infection Biology Transversal Theme Synergy grant
        - funding_agency_name: Chan Zuckerberg Initiative
          grant_id: 2021-234620
      cross_references: &id_cross_references
        publications: 10.1101/2025.11.11.687379
        # Representative subset of the deposition's ~141 PDB-derived structures.
        # For minimal_bacterium, the dominant content is bacterial 70S ribosomes
        # (4V4R, 4V5C, 4V5D, 4V5F, 4V5G, 7P6Z, 7PAT) and RNAP/expressomes (1MWS,
        # 6N60, 6CA0, 6ZTN). Full list in gts/semantic_classes_ids.dat and Supp.
        # Table 2.
        related_database_entries: >-
          EMPIAR-10499, EMPIAR-11756,
          PDB-1BXN, PDB-1MWS, PDB-1SS8, PDB-1ZBB, PDB-2CG9, PDB-2Q0U,
          PDB-4CR2, PDB-4UJD, PDB-4V4R, PDB-4V5C, PDB-5FMG, PDB-5OOL,
          PDB-5OXV, PDB-6KS8, PDB-6X9Q, PDB-7PEY
        related_database_links: >-
          https://github.com/frosinastojanovska/cryosiam,
          https://github.com/frosinastojanovska/cryosiam_vis,
          https://cryoetdataportal.czscience.com/datasets/10003,
          https://cryoetdataportal.czscience.com/datasets/10301
      dates: *id_dates
      grid_preparation: >-
        Not applicable - purely synthetic dataset generated in silico via the
        cryo-TomoSim (CTS) simulator. No physical grid preparation was performed.
      sample_preparation: >-
        Tomograms were simulated with cryo-TomoSim (CTS; Purnell et al., bioRxiv
        2023.04.28.538636), generating 50 synthetic 'minimal_bacterium' tomograms.
        Each volume was populated with complete 70S ribosomes (PDB 4V4R, 4V5C, 4V5D,
        4V5F, 4V5G, 7P6Z, 7PAT), 50S and 30S ribosomal subunits (e.g. 4YG2, 6AWB,
        7OOC), bacterial RNA polymerase (1MWS, 6N60, 6CA0) and RNAP-ribosome
        expressomes (6ZTN), together with membranous vesicles, membrane-embedded
        complexes (5SOA FabF mutant; G-protein/GPCR placeholders 6LFM, 6N52, 6HIS,
        4COF, 6WHV; glun1/gprotein synthetic classes), smaller cytosolic distractors
        (12GS GST, 1EXR/1QTX calmodulin, 2Q0U actin-toxin, 1SJJ alpha-actinin), and
        simulated DNA filaments. DNA filaments were generated with PolymerCpp
        (Stefko, Douglass & Manley, Zenodo 2020, doi:10.5281/zenodo.3928659) using
        the wormlike-chain (WLC) model: lengths 50, 100, 150, 200, 250, 300, 350,
        400, 450, 500, 1000 bp at persistence lengths 5, 6, 8, 10, 20 bp, converted
        to PDB and incorporated into CTS. Particles were placed largest-to-smallest
        with brute-force model filling, up to ~80% crowding. Sample thicknesses
        ranged 35-100 nm. Each 3D model was projected into a CTF-modulated synthetic
        tilt series (acquisition parameters in tiltseries metadata). Clean and noisy
        CTF-modulated tilt series were
        independently reconstructed via weighted back-projection (WBP) in IMOD.
        Tomogram XY dimensions are 600x600 voxels; Z varies per run.
      other_setup: In silico simulation (CTS pipeline; CryoETSim minimal-bacterium subset)
    sources:
      - literal:
          value:
            - "10492"

