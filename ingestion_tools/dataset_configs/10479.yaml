version: "1.3.0"

standardization_config:
  deposition_id: 10346
  run_data_map_file: run_to_data_map_v6.tsv
  source_prefix: william_nicolas_04_2026/--dryrun/

runs:
  - sources:
      - source_glob:
          list_glob: "*.st"
          name_regex: "(.+?)(?:\\.mrc)?\\.st$"

depositions:
  - sources:
      - literal:
          value:
            - 10346

datasets:
  - metadata:
      assay:
        name: microscopy assay
        id: EFO:0002909
      authors: &dataset_authors
        - name: William Jules Nicolas
          ORCID: 0000-0001-5970-8626
          primary_author_status: true
          corresponding_author_status: true
        - name: Grant Jensen
          primary_author_status: false
          corresponding_author_status: true
        - name: Elliot M Meyerowitz
          ORCID: 0000-0003-4798-5153
          primary_author_status: false
          corresponding_author_status: true
      cell_component:
        name: pollen tube
        id: GO:0090406
      dataset_description: >
        Collection of cryo-electron tomograms acquired on cryo-FIB-milled
        lamellae of germinated Arabidopsis thaliana pollen tubes. Lamellae were
        milled at various distances from the pollen tube tip and reveal dense
        networks of vesicles and lipid droplets, organelles such as Golgi,
        endoplasmic reticulum and vacuoles, and the surrounding cell wall.
        Tilt series were collected on a 300 kV TFS Krios with a Gatan K3 camera
        using SerialEM in a dose-symmetric scheme; tomograms were reconstructed
        in IMOD with a SIRT-like filter applied to a weighted back-projection
        reconstruction.
      dataset_identifier: 10479
      dataset_title: Arabidopsis thaliana pollen tubes
      dates: &dataset_dates
        deposition_date: "2026-04-28"
        last_modified_date: "2026-04-28"
        release_date: "2026-04-28"
      development_stage:
        name: unknown
        id: unknown
      disease:
        name: normal
        id: PATO:0000461
      funding:
        - funding_agency_name: Howard Hughes Medical Institute
          grant_id: null
        - funding_agency_name: California Institute of Technology
          grant_id: null
      grid_preparation: >
        Pollen was germinated on agar-based germination medium, then pipetted
        onto EM grids and plunge-frozen. Grids were subsequently transferred to
        a cryo-FIB instrument where lamellae of pollen tubes were milled, then
        screened and imaged on a TEM.
      organism:
        name: Arabidopsis thaliana
        taxonomy_id: 3702
      other_setup: Cryo-FIB milling
      sample_preparation: >
        Arabidopsis thaliana pollen was germinated in vitro on agar germination
        medium. Germinated pollen tubes were transferred to EM grids and
        plunge-frozen. Cryo-focused-ion-beam milling was used to produce thin
        lamellae through pollen tubes for cryo-electron tomography.
      sample_type: organelle
      tissue:
        name: pollen tube
        id: BTO:0001276
    sources:
      - literal:
          value:
            - "10479"

tiltseries:
  - metadata:
      acceleration_voltage: 300000
      binning_from_frames: 1
      camera:
        manufacturer: Gatan
        model: K3
      data_acquisition_software: SerialEM
      is_aligned: false
      microscope:
        manufacturer: TFS
        model: Krios
      microscope_optical_setup:
        energy_filter: Gatan Bioquantum
      pixel_spacing: float {ts_pixel_spacing}
      spherical_aberration_constant: 2.7
      tilt_axis: float {tilt_axis}
      tilt_range:
        max: float {ts_tilt_max}
        min: float {ts_tilt_min}
      tilt_series_quality: int {tilt_series_quality}
      tilt_step: 3.0
      tilting_scheme: dose-symmetric
      total_flux: 70
    sources:
      - source_glob:
          list_glob: "{mapped_tilt_series_name}.st"

rawtilts:
  - sources:
      - source_glob:
          list_glob: "{mapped_tilt_series_name}.rawtlt"

collection_metadata:
  - sources:
      - source_glob:
          list_glob: "{mdoc_basename}.mdoc"

frames:
- metadata:
    dose_rate: float {dose_rate}
    is_gain_corrected: true
  sources:
  - literal:
      value:
      - default

identified_objects:
  - metadata:
      filter_value: "{run_name}"
    sources:
      - source_glob:
          list_glob: identified_objects.csv

voxel_spacings:
  - sources:
      - literal:
          value:
            - 13.328
        parent_filters:
          include:
            run:
              - "^pol5-.*"
              - "^pol6-.*"
              - "^pol7-.*"
      - literal:
          value:
            - 10.600
        parent_filters:
          include:
            run:
              - "^pol9-3.*"
      - literal:
          value:
            - 13.320
        parent_filters:
          include:
            run:
              - "^pol9-4.*"

tomograms:
  - metadata:
      authors: *dataset_authors
      ctf_corrected: false
      dates: *dataset_dates
      fiducial_alignment_status: NON_FIDUCIAL
      is_visualization_default: true
      offset:
        x: 0
        y: 0
        z: 0
      processing: filtered
      processing_software: IMOD
      reconstruction_method: WBP
      reconstruction_software: IMOD
      tomogram_version: 1.0
      voxel_spacing: float {tomo_voxel_spacing}
    sources:
      - source_glob:
          list_glob: "{run_name}{tomo_suffix}"
