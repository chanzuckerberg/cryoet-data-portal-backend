datasets:
- metadata:
    assay:
      id: EFO:0002909
      name: microscopy assay
    authors: *id003
    cell_strain:
      id: NCBITaxon:469008
      name: Escherichia coli BL21(DE3)
    cell_type:
      id: CL:0000520
      name: prokaryotic cell
    cross_references:
      publications: 10.1021/acsnano.8b09683, 10.1021/acsnano.3c06178, 10.1002/smll.202506285
      related_database_entries: EMD-77085, EMD-77087
    dataset_description:
      Leviviridae PP7 VLP were inoculated into BL21(DE3) E. coli and plunge-frozen at the 1-hour timepoint. The targets
      for cryoET were selected based on high crowdedness and variable thickness (100-300 nm). The processing pipeline
      includes AreTomo3, Embrella, copick, octopi, RELION, py2rely, and pytom-match-pick. The most abundant geometry-
      the icosahedral T=3- was refined to 3.0 Å. Native E. coli protein complexes within the same tomograms (GroEL)
      were refined to 6.8 Å.
    dataset_identifier: 10493
    dataset_title: "PP7 virus-like particles in E. coli at 3.0 \xC5 (plunge-frozen)"
    dates: *id001
    development_stage:
      id: unknown
      name: unknown
    disease:
      id: PATO:0000461
      name: normal
    funding:
    - funding_agency_name: Chan Zuckerberg Initiative
      grant_id: "CZII-2023–327779"
    grid_preparation: Quantifoil R 2/1 Cu 200 Mesh grid glow discharged on carbon
      side at 15 mA for 45 seconds. Leica GP2 chamber conditions set to 10C temperature,
      90% humidity, 30 second delay time between adding sample and blotting, and blot
      for 6 seconds. Carefully apply 4uL of sample.
    organism:
      name: Escherichia coli BL21(DE3)
      taxonomy_id: 469008
    sample_preparation: PP7 plasmids are transformed into BL21(DE3) Competent E. coli
      cells and heat shocked for 30 seconds at 42C. Place the mixture on ice for 5
      minutes and then pipette 950uL of RT SOC into the mixture and place at 37C,
      200rpm for the recovery stage. After an hour, spread up to 100uL of mixture
      on streptomycin selection plates and leave overnight at 37C. Next day, carefully
      pick off an isolated colony mix into 50mL of 2YT+streptomycin media. Wait 12-16
      hours and take 10mL of starter culture and add to larger culture of 2YT media
      + streptomycin and shake at 200rpm (37C) until OD600 is between 0.6 and 0.8.
      Once this range is reached, add 100uL of 1M IPTG to begin induction process
      and collect 20mL of culture in a falcon tube every hour to be pelleted down
      and frozen (until hour 4). When ready to plunge-freeze, quickly thaw tube (either
      hand-thaw or in a water bath). Resuspend pellet with 100uL LB and measure OD600.
      Dilute sample until OD of 0.6 is reached. This dataset specifically is from
      the 1-hour time point.
    sample_type: primary_cell_culture
    tissue:
      id: CL:0000520
      name: prokaryotic cell
  sources:
  - literal:
      value:
      - '10493'
