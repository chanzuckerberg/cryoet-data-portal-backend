datasets:
- sources:
  - source_glob:
      list_glob: 1030?
      match_regex: .*
      name_regex: (.*)
deposition_keyphotos:
- sources:
  - literal:
      value:
        snapshot: cryoetportal-rawdatasets-dev/deposition_key_photos/deposition_10314_snapshot.png
        thumbnail: cryoetportal-rawdatasets-dev/deposition_key_photos/deposition_10314_thumbnail.png
depositions:
- metadata:
    authors: *id001
    cross_references:
      publications: 10.7554/eLife.98552.3, 10.1101/2025.01.16.633326
    dates: *id002
    deposition_description: 'These segmentations of 23 different organelles and macromolecular
      structures across the 1829 volumes in the C. reinhardtii dataset were generated
      as a part of a project that explored the scaling of data analyses in cryoET.
      On the basis of these comprehensive segmentations the dataset was also ''summarized''
      and represented a searchable database (see method links).

      All segmentations were generated using convolutional neural networks. Networks
      to segment macromolecules (membrane, ribosome, F1-F0 complex, RuBisCo complex,
      chaperonin-containing T complex, and proteasome complex) were prepared using
      Ais (check method links for network weights). The remaining features were segmented
      by a single network that was prepared using Pom.'
    deposition_identifier: 10314
    deposition_title: Comprehensive semi-supervised automated annotations of macromolecules
      and organelles in C. reinhardtii tomograms
    deposition_types:
    - annotation
  sources:
  - literal:
      value:
      - 10314
runs:
- sources:
  - source_glob:
      list_glob: '{dataset_name}/*.mrc'
      match_regex: .*
      name_regex: (.*?)_bin2__.*.mrc
standardization_config:
  deposition_id: 10314
  source_prefix: mart_last_11_2024/
version: 1.3.0
voxel_spacings:
- sources:
  - destination_glob:
      list_glob: '{run_output_path}/Reconstructions/VoxelSpacing*'
      match_regex: .*
      name_regex: VoxelSpacing(.*)
