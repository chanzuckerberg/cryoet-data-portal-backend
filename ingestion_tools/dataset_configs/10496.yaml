datasets:
  - metadata:
      assay:
        name: microscopy assay
        id: EFO:0002909
      authors: &id001
        - name: Anchi Cheng
          ORCID: 0000-0003-0466-4376
          primary_author_status: false
          corresponding_author_status: false
        - name: Joshua Hutchings
          ORCID: 0000-0001-6841-8583
          primary_author_status: true
          corresponding_author_status: false
        - name: Elizabeth Montabana
          ORCID: 0000-0002-6731-5854
          primary_author_status: false
          corresponding_author_status: false
        - name: Mykhailo Kopylov
          ORCID: 0000-0003-0188-9799
          primary_author_status: false
          corresponding_author_status: false
        - name: Mohammadreza Paraan
          ORCID: 0000-0002-8402-0134
          primary_author_status: false
          corresponding_author_status: false
        - name: Yue Yu
          ORCID: 0000-0002-3248-9678
          email: yue.yu@czii.org
          primary_author_status: false
          corresponding_author_status: true
        - name: Pavel K. Olshin
          ORCID: 0000-0002-0107-3258
          email: pavel.olshin@czii.org
          primary_author_status: false
          corresponding_author_status: true
      cell_component:
        name: ferritin complex
        id: GO:0070288
      cross_references:
        publications: 10.64898/2026.06.05.730245
      dataset_description: >
        A single tilt series of monolayer apoferritin acquired on a customized
        Krios G4 microscope equipped with a crossed laser phase plate (xLPP).
        The xLPP was operated at laser powers corresponding to a ~90° phase
        shift, providing in-focus phase contrast across the full spatial
        frequency range. The tilt series was collected from −27° to +27° using
        a bidirectional acquisition scheme, serving as a demonstration of
        xLPP-enabled cryo-electron tomography.
      dataset_identifier: 10496
      dataset_title: "Crossed laser phase plate (xLPP) demonstration tomogram of single-layer apoferritin"
      dates: &id002
        deposition_date: "2026-05-20"
        last_modified_date: "2026-05-20"
        release_date: "2026-05-20"
      development_stage:
        id: unknown
        name: unknown
      disease:
        id: PATO:0000461
        name: normal
      funding:
        - funding_agency_name: Chan Zuckerberg Initiative
          grant_id: CZII-2023-327779
      grid_preparation: >
        Aliquots (≥10 mg/mL) of purified Mouse Heavy Chain Apoferritin were
        thawed on ice and 1 mM DTT was added immediately before plunge-freezing
        3 µL on Quantifoil Au 200 1.2/1.3 grids using a ThermoFisher Vitrobot
        Mark IV. Vitrification parameters: 10 °C, 100 % relative humidity, 30 s
        wait time, blot force 0, variable blot times.
      organism:
        name: Mus musculus
        taxonomy_id: 10090
      other_setup: "xLPP cryo-electron tomography"
      sample_preparation: >
        Mouse Heavy Chain Apoferritin was purified in house and stored at
        −80 °C until use.
      sample_type: in_vitro
    sources:
      - literal:
          value:
            - "10496"
