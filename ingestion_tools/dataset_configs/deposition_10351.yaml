datasets:
  - sources:
      - literal:
          value:
            - '10000'
            - '10001'

deposition_keyphotos:
  - sources:
      - literal:
          value:
            snapshot: cryoetportal-rawdatasets-dev/deposition_key_photos/deposition_10351_snapshot.png
            thumbnail: cryoetportal-rawdatasets-dev/deposition_key_photos/deposition_10351_thumbnail.png

dataset_keyphotos:
  - sources:
      - destination_glob:
          list_glob: '{dataset_output_path}/Images/*'
          match_regex: '(snapshot|thumbnail)\.(png|jpg|jpeg)$'
          name_regex: '(snapshot|thumbnail)'

depositions:
  - metadata:
      authors: *id_authors
      cross_references:
        publications: doi:10.1101/2022.04.12.488077, doi:10.1038/s41592-022-01746-2
        related_database_entries: EMPIAR-10988, EMD-14404, EMD-14405, EMD-14406,
          EMD-14408, EMD-14409, EMD-14410, EMD-14411, EMD-14412, EMD-14413, EMD-14415,
          EMD-14417, EMD-14418, EMD-14419, EMD-14420
      dates: *id_dates
      deposition_description: >-
        The yeast segmentation dataset of POPSICLE (Particle/Object Picking &
        Segmentation In CryoET Learning & Evaluation), a benchmark suite
        released to support
        reproducible evaluation of machine-learning models for dense
        voxel-wise compartment segmentation in eukaryotic cellular cryo-ET.
        This deposition is a consolidated re-release of manually-curated
        semantic segmentations covering six organelle classes (cytoplasm,
        nucleus, nuclear envelope, vesicle, membrane-enclosed lumen, mitochondrion)
        across 19 cryo-electron tomograms of Schizosaccharomyces pombe drawn
        from CryoET Data Portal datasets 10000 (defocus) and 10001 (Volta
        phase plate). Annotations were assembled with the copick toolkit at
        13.48 Å voxel spacing and serve as a low-data, high-variance
        organelle-segmentation regime that complements the bacterial
        deposition (10350) within the POPSICLE benchmark suite.
      deposition_identifier: 10351
      deposition_title: >-
        The POPSICLE Yeast Segmentation Dataset: consolidated multi-class
        organelle segmentations for S. pombe cryo-ET tomograms
      deposition_types:
        - annotation
    sources:
      - literal:
          value:
            - 10351

runs:
  - sources:
      - literal:
          value:
            - TS_026
            - TS_027
            - TS_028
            - TS_029
            - TS_030
            - TS_034
            - TS_037
            - TS_041
            - TS_043
            - TS_045
        parent_filters:
          include:
            dataset:
              - '^10000$'
      - literal:
          value:
            - TS_0001
            - TS_0002
            - TS_0003
            - TS_0004
            - TS_0005
            - TS_0006
            - TS_0007
            - TS_0008
            - TS_0009
        parent_filters:
          include:
            dataset:
              - '^10001$'

standardization_config:
  deposition_id: 10351
  run_data_map_file: run_to_data_map.tsv
  source_prefix: CZII/20260504_popsicle/yeast_summarized/

version: 1.3.0

voxel_spacings:
  - sources:
