    cell_component:
      id: GO:0043231
      name: intracellular membrane-bounded organelle
    cell_strain:
      id: CVCL_0063
      name: HEK293T
    cell_type:
      id: CL:0002518
      name: kidney epithelial cell
    dataset_description: This large-scale cryo-electron tomography (cryo-ET) dataset
      contains tilt series from affinity-captured organelles derived from HEK293T
      lysates. The experimental design utilizes electron microscopy grids functionalized
      with anti-GFP nanobodies to capture organelles tagged with GFP-TMEM192 from
      cells subject to amino acid starvation for 3 hours. To map the V-ATPase complex,
      organelles were labeled with 2.2 nm gold nanoparticles targeting the V1A subunit
      via the SidK probe (dilutions ranging 1:10 to 1:500). The complete dataset includes
      raw frames, alignments, tomograms, and annotations. All data were processed
      using the automated AreTomo3 pipeline, with semantic segmentations generated
      by both SABER and Membrain-Seg.
    dataset_identifier: 10460
    dataset_title: Large-scale cryo-ET dataset of affinity-captured organelles (TMEM192
      + Starvation + V1A SidK-Gold) HEK293T cells
    dates: *id001
    development_stage:
      id: unknown
      name: unknown
    disease:
      id: PATO:0000461
      name: normal
    funding:
    - funding_agency_name: Chan Zuckerberg Initiative
      grant_id: "CZII-2023\u2013327779"
    grid_preparation: "Grid preparation was performed using a Leica EM GP2 + Affinity\
      \ grids were incubated with 6 \xB5l of lysate for approximately 15 seconds,\
      \ after which excess liquid was removed by blotting from the grid edge with\
      \ filter paper + This lysate addition and blotting step was repeated three times,\
      \ followed by a wash with 6 \xB5l of ice-cold PBS + The entire sample application\
      \ and washing process was performed twice + Finally, 6 \xB5l of PBS was added\
      \ immediately prior to blotting and plunging into liquid ethane"
    organism:
      name: Homo sapiens
      taxonomy_id: 9606
    other_setup: null
    sample_preparation: "Affinity-grids were prepared by covering holey carbon grids\
      \ with a thin layer of graphene oxide + GFP-nanobodies were then immobilized\
      \ onto the graphene oxide surface using a PEG-linker + For cell processing,\
      \ cells expressing TMEM192-GFP were subjected to amino acid starvation for 3\
      \ hours + Cells were washed and detached using ice-cold PBS + They were then\
      \ transferred to a chilled 15 ml Falcon tube and pelleted by centrifugation\
      \ at 500 x g for 5 minutes at 4\xB0C + After aspirating the PBS, the pellet\
      \ was resuspended in approximately 950 \xB5l of hypotonic homogenization buffer\
      \ + The cells were subsequently mechanically lysed using a 23G blunt needle\
      \ + The resulting mixture was transferred to and mixed with isotonic sucrose\
      \ buffer + Finally, the lysates were centrifuged at 1000 x g for 10 minutes\
      \ at 4\xB0C, the resulting supernatant was incubated with SidK-functionalized\
      \ 2.2 nm gold nanoparticles to label V1A  at 4\xB0C for 1 hour for use in grid\
      \ preparation."
    sample_type: organelle
    tissue:
      id: CL:0002518
      name: kidney epithelial cell
