version: "1.3.0"

standardization_config:
  deposition_id: 10346
  run_data_map_file: run_to_data_map.tsv
  source_prefix: william_nicolas_04_2026/

runs:
  - sources:
      - source_glob:
          list_glob: "*.st"
          name_regex: "(.*)\\.st$"

depositions:
  - metadata:
      authors: &deposition_authors
        - name: William Jules Nicolas
          ORCID: 0000-0001-5970-8626
          email: william.nicolas.pro@gmail.com
          primary_author_status: true
          corresponding_author_status: true
        - name: Grant J Jensen
          email: grant_jensen@byu.edu
          primary_author_status: false
          corresponding_author_status: true
        - name: Elliot M Meyerowitz
          ORCID: 0000-0003-4798-5153
          email: meyerow@caltech.edu
          primary_author_status: false
          corresponding_author_status: true
      dates: &deposition_dates
        deposition_date: "2026-04-28"
        last_modified_date: "2026-04-28"
        release_date: "2026-04-28"
      deposition_description: >
        Cryo-electron tomography of Arabidopsis thaliana, comprising two
        complementary datasets acquired on a 300 kV TFS Krios with SerialEM
        data acquisition. The first dataset (CEMOVIS / CETOVIS) contains cryo-
        tomograms of plant-type cell walls captured in cryosections of high-
        pressure-frozen liquid-cultured Arabidopsis cells, imaged on a Gatan K2
        SUMMIT detector. The second dataset contains cryo-FIB-milled tomograms
        of intact germinated Arabidopsis pollen tubes, imaged on a Gatan K3
        detector and revealing dense networks of vesicles, lipid droplets,
        organelles and cell wall architecture. Reconstructions were generated
        in IMOD using weighted back-projection with a SIRT-like filter.
      deposition_identifier: 10346
      deposition_title: Cryo-electron tomography of Arabidopsis thaliana —
        plant cell walls in CEMOVIS sections of cultured cells and intact pollen
        tubes in cryo-FIB lamellae
      deposition_types:
        - dataset
    sources:
      - literal:
          value:
            - 10346

datasets:
  - metadata:
      assay:
        name: microscopy assay
        id: EFO:0002909
      authors: *deposition_authors
      cell_component:
        name: plant-type cell wall
        id: GO:0009505
      dataset_description: >
        Cryo-electron tomograms of plant-type cell walls in liquid-cultured
        Arabidopsis thaliana cells. Cells were high-pressure frozen and
        processed by cryo-ultramicrotomy to produce vitreous cryosections
        (CEMOVIS / CETOVIS), capturing the cell wall between adjacent cells in
        a near-native state. Tilt series were collected on a 300 kV TFS Krios
        with a Gatan K2 SUMMIT camera using SerialEM in a dose-symmetric
        scheme; tomograms were reconstructed in IMOD using weighted
        back-projection with a SIRT-like filter applied during reconstruction.
      dataset_identifier: 10478
      dataset_title: CEMOVIS of plant-type cell walls in Arabidopsis thaliana
        cultured cells
      dates: *deposition_dates
      development_stage:
        name: unknown
        id: unknown
      disease:
        name: normal
        id: PATO:0000461
      funding:
        - funding_agency_name: Howard Hughes Medical Institute
          grant_id: null
      grid_preparation: >
        Cryosections (~70–100 nm) of high-pressure-frozen liquid-cultured
        Arabidopsis thaliana cells were collected on EM grids at cryogenic
        temperature using a cryo-ultramicrotome, capturing inter-cellular cell
        wall regions.
      organism:
        name: Arabidopsis thaliana
        taxonomy_id: 3702
      other_setup: CEMOVIS (cryo-electron microscopy of vitreous sections)
      sample_preparation: >
        Liquid-cultured Arabidopsis thaliana cells were high-pressure frozen
        and processed by cryo-ultramicrotomy to produce vitreous cryosections
        (CEMOVIS / CETOVIS), with the imaging plane crossing the cell wall
        between adjacent cells.
      sample_type: organelle
    sources:
      - literal:
          value:
            - "10478"

tiltseries:
  - metadata:
      acceleration_voltage: 300000
      binning_from_frames: 1
      camera:
        manufacturer: Gatan
        model: K2 SUMMIT
      data_acquisition_software: SerialEM
      is_aligned: false
      microscope:
        manufacturer: TFS
        model: Krios
      microscope_optical_setup:
        energy_filter: GIF Quantum LS
      pixel_spacing: float {ts_pixel_spacing}
      spherical_aberration_constant: 2.7
      tilt_axis: float {tilt_axis}
      tilt_range:
        max: float {ts_tilt_max}
        min: float {ts_tilt_min}
      tilt_series_quality: int {tilt_series_quality}
      tilt_step: 1.0
      tilting_scheme: dose-symmetric
      total_flux: 70
    sources:
      - source_glob:
          list_glob: "{run_name}.st"

rawtilts:
  - sources:
      - source_glob:
          list_glob: "{run_name}.rawtlt"

voxel_spacings:
  - sources:
      - tomogram_header:
          list_glob: "{run_name}.rec"

tomograms:
  - metadata:
      authors: *deposition_authors
      ctf_corrected: false
      dates: *deposition_dates
      fiducial_alignment_status: NON_FIDUCIAL
      is_visualization_default: true
      offset:
        x: 0
        y: 0
        z: 0
      processing: filtered
      processing_software: IMOD
      reconstruction_method: WBP
      reconstruction_software: IMOD
      tomogram_version: 1.0
      voxel_spacing: float {tomo_voxel_spacing}
    sources:
      - source_glob:
          list_glob: "{run_name}.rec"
