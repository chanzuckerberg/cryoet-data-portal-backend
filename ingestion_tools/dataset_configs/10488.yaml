version: 1.3.0

alignments:
  - metadata:
      format: IMOD
      method_type: fiducial_based
      alignment_type: LOCAL
      is_portal_standard: true
    sources:
      - source_glob:
          list_glob: '{run_name}/*.xf'
          match_regex: '.*\.xf$'
      - source_glob:
          list_glob: '{run_name}/*.tlt'
          match_regex: '.*\.tlt$'

annotations:
  - metadata:
      annotation_ingest_id: byu_kaggle_flagellar_motor_10488
      annotation_method: initial prediction by ML model + verified and corrected by hand
      annotation_object:
        id: GO:0120100
        name: bacterial-type flagellum motor
      annotation_software: IMOD
      authors: &authors
        - name: Stephano Maggi
          corresponding_author_status: true
          primary_author_status: true
        - name: Christopher Braxton Owens
          corresponding_author_status: false
          primary_author_status: false
        - name: Gus L. W. Hart
          corresponding_author_status: false
          primary_author_status: false
        - name: Andrew Darley
          corresponding_author_status: false
          primary_author_status: false
      dates: &dates
        deposition_date: "2026-04-29"
        last_modified_date: "2026-04-29"
        release_date: "2026-04-29"
      ground_truth_status: true
      is_curator_recommended: true
      method_type: hybrid
      version: 1.0
    sources:
      - Point:
          file_format: csv_with_header
          glob_string: '{run_name}/{file_prefix}_flagellar_motor.csv'
          is_visualization_default: true
          columns: zyx

