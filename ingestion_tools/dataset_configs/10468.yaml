- sources:
  - literal:
      value:
        snapshot: null
        thumbnail: null
datasets:
- metadata:
    assay:
      id: EFO:0002909
      name: microscopy assay
    authors: *id001
    dataset_description: "This dataset, acquired with defocus imaging only (no phase\
      \ plates), is intended for comparison with a corresponding VPP dataset to benchmark\
      \ the effect of the Volta Phase Plate in tomogram alignment and subtomogram\
      \ averaging. The virus-like particles and the 80S ribosomes (with available\
      \ annotations) reached sub-5\xC5 STA resolution."
    dataset_identifier: 10468
    dataset_title: CZII 2-protein phantom (version 1.0) with defocus-based imaging
    dates: *id002
    development_stage:
      id: unknown
      name: unknown
    disease:
      id: PATO:0000461
      name: normal
    funding:
    - funding_agency_name: Chan Zuckerberg Initiative
      grant_id: "CZII-2023\u2013327779"
    grid_preparation: null
    other_setup: null
    sample_preparation: null
    sample_type: in_vitro
    tissue:
      id: UBERON:0000061
      name: anatomical structure
  sources:
  - literal:
      value:
      - '10468'
deposition_keyphotos:
- sources:
  - literal:
      value:
        snapshot: cryoetportal-rawdatasets-dev/deposition_key_photos/deposition_10341_snapshot.png
        thumbnail: cryoetportal-rawdatasets-dev/deposition_key_photos/deposition_10341_thumbnail.png
depositions:
- metadata:
    authors: *id001
    dates:
      deposition_date: '2026-01-09'
      last_modified_date: '2026-01-09'
      release_date: '2026-01-09'
    deposition_description: This deposition has two datasets, one acquired with the
      Volta phase plate at low defocus and one acquired without at higher defocus.
      The datasets are comprised of movie stacks, tiltseries, alignments, tomograms
      and hand-curated ground truth annotations of PP7 virus like particles. The data
      was acquired on a Krios G4 using a Falcon 4i detector and SelectrisX energy
      filter. Tomograms were aligned using AreTomo3 2.2.2. Each run provides denoised
      and CTF-corrected tomograms.
    deposition_identifier: 10341
    deposition_title: CZII 2-protein phantom (version 1.0)
    deposition_types:
    - dataset
    - annotation
  sources:
  - literal:
      value:
      - 10341
frames:
- metadata:
    dose_rate: float {dose_rate}
    is_gain_corrected: false
  sources:
  - source_glob:
      list_glob: '{run_name}/*.eer'
gains:
- sources:
  - source_glob:
      list_glob: '{gain_file}'
rawtilts:
- sources:
  - source_glob:
      list_glob: '{run_name}_st.rawtlt'
runs:
- sources:
  - source_glob:
      list_glob: '*.aln'
      match_regex: .*\.aln$
      name_regex: (.*)\.aln$
standardization_config:
  deposition_id: 10341
  run_data_map_file: run_to_data_map_combined.tsv
  source_prefix: CZII/20260109_2protein_1.0/3protein_phantom/
tiltseries:
- metadata:
    acceleration_voltage: 300000
    binning_from_frames: 1
    camera:
      manufacturer: TFS
      model: FALCON 4i
    data_acquisition_software: Tomo5
    is_aligned: false
    microscope:
      manufacturer: TFS
      model: TITAN KRIOS G4
    microscope_optical_setup:
      energy_filter: Selectris X
    pixel_spacing: 1.54
    spherical_aberration_constant: 2.7
    tilt_axis: -96
    tilt_range:
      max: float {tilt_series_max_tilt}
      min: float {tilt_series_min_tilt}
    tilt_series_quality: int {tilt_series_quality}
    tilt_step: 3.0
    tilting_scheme: dose-symmetric
    total_flux: float {tilt_series_total_flux}
  sources:
  - source_glob:
      list_glob: '{run_name}_TS.mrc'
      match_regex: .*\.mrc$
