    dates: *id002
    deposition_description: Agent-curated membrane segmentations and compartment
      annotations (cell, cytoplasm, periplasmic space, and bacterial-type flagellum)
      for Bdellovibrio bacteriovorus cryo-ET data. Segmentations were produced by combining automated
      membrane predictions with semi-manual annotations created using napari-nnInteractive,
      followed by an agent-designed curation pipeline generated through copick-mcp.
    deposition_identifier: 10338
    deposition_title: Agent-Curated Membrane Segmentations and Compartment Annotations for Bdellovibrio bacteriovorus
      Cryo-ET Data.
    cross_references:
      publications: 10.1002/pro.70578
    deposition_types:
    - annotation
