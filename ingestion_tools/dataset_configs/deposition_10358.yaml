depositions:
- metadata:
    authors: *id001
    dates: *id002
    deposition_description: 'Particle-pick annotations produced by Octopi and TopCup, two deep-learning
      particle-detection models from the self-configuring in situ cryoET structure-determination workflow
      (Octopi + py2rely). Octopi is a self-configuring 3D U-Net whose architecture/hyperparameters are
      selected per dataset by Bayesian optimization; TopCup is an open re-implementation of the top-ranked
      2024-2025 Kaggle CryoET Object Identification Challenge solution, used as a fixed-architecture baseline.
      Picks are deposited for: GroEL in in-situ E. coli (10493); apo-ferritin, beta-amylase, beta-galactosidase,
      ribosome, thyroglobulin
      and virus-like particle in the Phantom/ML-Challenge datasets (10440, 10445, 10446; both Octopi and
      TopCup); cytosolic and membrane-bound ribosomes in unroofed cells (10426, 10427, 10431, 10432, 10433,
      10435); and V-ATPase on isolated synaptic vesicles (10453). All picks are model predictions
      validated by subtomogram averaging with py2rely (RELION-5).'
    deposition_identifier: 10358
    deposition_title: Octopi and TopCup particle picks for a self-configuring in situ cryoET structure-determination
      workflow
    deposition_types:
    - annotation
  sources:
  - literal:
      value:
      - 10358
