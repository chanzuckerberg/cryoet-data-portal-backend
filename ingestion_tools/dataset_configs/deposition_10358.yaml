# Deposition 10358 - Octopi/TopCup particle-pick annotations into existing datasets (single config, 11 datasets).
# OrientedPoints carry per-object subtomogram-average glb meshes (maps/*.glb) via mesh_source_path.
# Source bucket: cryoetportal-biohub-hpc-globus. V-ATPase (10453) attaches to VoxelSpacing10.000 (dep 10359). See FINAL_REPORT.md.
version: 1.3.0
alignments:
- sources:
  - destination_glob:
      list_glob: '{run_output_path}/Alignments/100/alignment_metadata.json'
      match_regex: .*
      name_regex: (.*)
    parent_filters:
      include:
        dataset:
          - '10426'
          - '10427'
          - '10431'
          - '10432'
          - '10433'
          - '10435'
          - '10440'
          - '10445'
          - '10446'
          - '10493'
  - destination_glob:
      list_glob: '{run_output_path}/Alignments/101/alignment_metadata.json'
      match_regex: .*
      name_regex: (.*)
    parent_filters:
      include:
        dataset:
          - '10453'
annotations:
- metadata:
    annotation_ingest_id: groel-octopi-1
    annotation_method: Automated particle detection with Octopi, a self-configuring supervised 3D U-Net
      (built on MONAI primitives) whose architecture and training hyperparameters are selected per dataset
      via Bayesian optimization (Optuna, TPE sampler). Particle coordinates were extracted from the predicted
      per-class segmentation masks using a watershed-based peak detector, retaining candidates whose effective
      radius is 50-100% of the specified particle radius. Coordinates were validated by subtomogram averaging
      with py2rely (RELION-5).
    annotation_object:
      id: UniProtKB:P0A6F5
      name: Chaperonin GroEL
      description: Bacterial chaperonin GroEL (E. coli), picked as the tetradecameric barrel
    annotation_software: Octopi
    authors: &id001
