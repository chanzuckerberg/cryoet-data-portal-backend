datasets:
- metadata:
    assay:
      id: EFO:0002909
      name: microscopy assay
    authors: *id003
    cell_strain:
      id: NCBITaxon:469008
      name: Escherichia coli BL21(DE3)
    cell_type:
      id: CL:0000520
      name: prokaryotic cell
    cross_references:
      publications: 10.1021/acsnano.8b09683, 10.1021/acsnano.3c06178, 10.1002/smll.202506285
      related_database_entries: EMD-77086, EMD-77088
    dataset_description: "Leviviridae PP7 VLP were inoculated into BL21(DE3) E. coli\
      \ and high-pressure frozen at the 2-hour timepoint. 5 lamellae were generated\
      \ using a plasma FIB-SEM. The processing pipeline includes AreTomo3, Embrella,\
      \ copick, octopi, RELION, and py2rely. The most abundant geometry- the icosahedral\
      \ T=3- was refined to 3.9 \xC5."
    dataset_identifier: 10494
    dataset_title: "PP7 virus-like particles in E. coli at 3.9 \xC5 (lamellae)"
    dates: *id001
    development_stage:
      id: unknown
      name: unknown
    disease:
      id: PATO:0000461
      name: normal
    funding:
    - funding_agency_name: Chan Zuckerberg Initiative
      grant_id: "CZII-2023–327779"
    grid_preparation: Quantifoil R 1/4 SiO2 200 Mesh grid glow discharged on back
      side at 15 mA for 45 seconds. For every grid, two Leica Type B planchettes with
      a diameter of 6 mm were sanded using P800, P7000, and P15000 grit in increasing
      order and cleaned with metal polish. The planchettes were then coated with a
      solution of 0.5% cetyl palmitate in diethyl ether and placed on Whatman filter
      paper to dry; a thin film was visible on the planchettes after evaporation.
      Carefully apply 3uL of the pellet to the grid without introducing air bubbles.
    organism:
      name: Escherichia coli BL21(DE3)
      taxonomy_id: 469008
    other_setup: High-pressure freezing + plasma Cryo-FIB milling
    sample_preparation: PP7 plasmids are transformed into BL21(DE3) Competent E. coli
      cells and heat shocked for 30 seconds at 42C. Place the mixture on ice for 5
      minutes and then pipette 950uL of RT SOC into the mixture and place at 37C,
      200rpm for the recovery stage. After an hour, spread up to 100uL of mixture
      on streptomycin selection plates and leave overnight at 37C. Next day, carefully
      pick off an isolated colony mix into 50mL of 2YT+streptomycin media. Wait 12-16
      hours and take 10mL of starter culture and add to larger culture of 2YT media
      + streptomycin and shake at 200rpm (37C) until OD600 is between 0.6 and 0.8.
      Once this range is reached, add 500uL of IPTG to begin induction process and
      collect 20mL of culture in a falcon tube every hour to be pelleted down and
      frozen (until hour 4) and stored at -80C for long-term storage. When ready to
      high-pressure freeze, hand thaw sample until last ice crystal disappears. Resuspend
      pellet in 150uL of LB Broth and centrifuge at 1500 g for 15 min at 4C. Immediately
      before freezing, remove most of the supernatant, add 10% glycerol to the pellet,
      and gently mix without introducing air bubbles. After high-pressure freezing,
      lamellae were prepared using a plasma FIB-SEM.
    sample_type: primary_cell_culture
    tissue:
      id: CL:0000520
      name: prokaryotic cell
  sources:
  - literal:
      value:
      - '10494'
