datasets:
- metadata:
    dataset_identifier: 10497
    dataset_title: Cryo-electron tomography of purified E. coli 70S ribosomes acquired
      by fast-incremental single-exposure (FISE) tilt series
    dataset_description: 'Purified 70S ribosomes from Escherichia coli strain DH5-alpha
      were imaged by cryo-electron tomography using the fast-incremental single-exposure
      (FISE) tilt-series acquisition method. Ribosomes were isolated from a cleared
      cell lysate by sucrose-cushion ultracentrifugation, mixed with 10 nm colloidal-gold
      fiducials, and plunge-frozen on Quantifoil grids. Twelve dose-symmetric FISE
      tilt series (-60 to +60 degrees, 3 degree increments, 2.1 Angstrom per pixel)
      were collected on a Titan Krios equipped with a Gatan K3 detector and energy
      filter, and subtomogram averaging of the ribosome particles yields a sub-nanometre-resolution
      map of the 70S ribosome. The raw tilt series were originally deposited as EMPIAR-10304;
      the tomograms in this dataset were reconstructed from those tilt series by the
      CryoET Data Portal team.'
    authors: &dataset_authors
    - name: Fabian Eisenstein
      ORCID: 0000-0002-1261-7126
      affiliation_name: ETH Zurich
      affiliation_address: Institute of Molecular Biology and Biophysics, Department
        of Biology, ETH Zurich, 8093 Zurich, Switzerland
      affiliation_identifier: 05a28rw58
      primary_author_status: true
      corresponding_author_status: false
    - name: Radostin Danev
