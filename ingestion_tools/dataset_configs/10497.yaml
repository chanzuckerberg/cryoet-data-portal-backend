    grid_preparation: '4 uL of the diluted ribosome sample was applied to a glow-discharged
      Quantifoil Cu 200 R2/2 holey-carbon EM grid, blotted for 3 s, and vitrified
      by plunging into liquid ethane using a Vitrobot Mark IV (Thermo Scientific).
      10 nm colloidal gold fiducials (Aurion BSA tracer 10 nm) were added to the sample
      prior to freezing.'
    sample_preparation: 'Escherichia coli DH5-alpha was grown in Luria-Bertani (LB)
      broth to an OD600 of about 0.6 and harvested by centrifugation. Cells were resuspended
      in lysis buffer (20 mM Tris-HCl pH 7.5, 100 mM KOAc, 10 mM Mg(OAc)2, 0.5 mM
      CaCl2, 1 mM DTT, chloramphenicol, lysozyme and DNase I), incubated, and freeze-thawed.
      Cell debris was removed by centrifugation, and the cleared lysate was layered
      over a 750 mM sucrose cushion and spun at ~417,000 x g for 1 h. The ribosome
      pellet was washed and resuspended in buffer (20 mM Tris-HCl pH 7.5, 100 mM KOAc,
      10 mM Mg(OAc)2, 1 mM DTT, chloramphenicol). The purified 70S ribosomes were
      diluted 1:50 before grid preparation.'
    cross_references:
      publications: 10.1016/j.jsb.2019.08.006
      related_database_entries: EMPIAR-10304, EMD-10211
