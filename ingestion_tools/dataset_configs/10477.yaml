depositions:
  - metadata:
      authors: *annotation_authors
      cross_references: *cross_refs
      dates: *dates
      deposition_description: >-
        Cryo-electron tomography data of centrosomes in dissociated C. elegans embryonic cells across the cell cycle.
        The deposition includes raw frames, tilt series stacks, alignment transforms, reconstructed tomograms, and
        semantic segmentation annotations of centrioles, microtubules, ribosomes, membranes, and pericentriolar
        material. 12 tomograms from cells at different cell cycle stages (interphase, prophase, metaphase, anaphase,
        telophase) were collected on a 300 kV Titan Krios with K2 Summit detector and Volta phase plate.
      deposition_identifier: 10345
      deposition_title: Cryo-electron tomography of centrosomes in C. elegans embryonic cells
      deposition_types:
        - dataset
    sources:
      - literal:
          value:
            - 10345

