      annotation_ingest_id: centriole-1
      annotation_method: Centriole microtubules were manually traced in Amira 2021.1.
      annotation_object:
        id: GO:0005814
        name: centriole
      annotation_publications: 10.1016/j.devcel.2024.12.002
      annotation_software: Amira 2021.1
      authors: &annotation_authors
        - name: Fergus Tollervey
          primary_author_status: true
          corresponding_author_status: false
          ORCID: 0000-0003-4829-3159
          affiliation_name: Structural and Computational Biology Unit, European Molecular Biology Laboratory (EMBL), Heidelberg, Germany
        - name: Manolo U. Rios
          primary_author_status: false
          corresponding_author_status: false
          ORCID: 0000-0001-8457-5378
          affiliation_name: Department of Cell Biology and Biophysics, University of Texas Southwestern Medical Center, Dallas, TX, USA
        - name: Evgenia Zagoriy
          primary_author_status: false
          corresponding_author_status: false
          ORCID: 0000-0003-2523-5132
          affiliation_name: Structural and Computational Biology Unit, European Molecular Biology Laboratory (EMBL), Heidelberg, Germany
        - name: Jeffrey B. Woodruff
          primary_author_status: false
          corresponding_author_status: true
          ORCID: 0000-0002-5590-9620
          affiliation_name: Department of Cell Biology and Biophysics, University of Texas Southwestern Medical Center, Dallas, TX, USA
          email: jeffrey.woodruff@utsouthwestern.edu
        - name: Julia Mahamid
          primary_author_status: false
          corresponding_author_status: true
          ORCID: 0000-0001-6968-041X
          affiliation_name: Structural and Computational Biology Unit, European Molecular Biology Laboratory (EMBL), Heidelberg, Germany
          email: julia.mahamid@embl.de
      dates: &dates
        deposition_date: "2025-03-25"
        last_modified_date: "2025-03-25"
        release_date: "2025-03-25"
      ground_truth_status: true
      is_curator_recommended: true
      method_links:
        - custom_name: Amira
          link: https://www.thermofisher.com/ch/en/home/electron-microscopy/products/software-em-3d-vis/amira-software.html
          link_type: website
      method_type: manual
      version: 1.0
    sources:
      - SemanticSegmentationMask:
          file_format: mrc
          glob_string: labels/{run_name}_centrioles.mrc
          is_visualization_default: true
          mask_label: 1

  - metadata:
      annotation_ingest_id: microtubule-1
      annotation_method: >-
        Segmentation of microtubules was carried out using a cylinder correlation function in Amira 2021.1 on
        Gaussian-filtered 4x binned tomograms. Results were manually examined and erroneous results removed. For one
        tomogram, binary masks from the other 11 were used to train a DeePiCt model, and the trained model was used
        for prediction with manual cleanup.
      annotation_object:
        id: GO:0005874
        name: microtubule
      annotation_publications: 10.1016/j.devcel.2024.12.002
      annotation_software: Amira 2021.1, DeePiCt
      authors: *annotation_authors
      dates: *dates
      ground_truth_status: true
      is_curator_recommended: true
      method_links:
        - custom_name: Amira
          link: https://www.thermofisher.com/ch/en/home/electron-microscopy/products/software-em-3d-vis/amira-software.html
          link_type: website
        - custom_name: DeePiCt
          link: https://github.com/ZauggGroup/DeePiCt
          link_type: source_code
      method_type: hybrid
      version: 1.0
    sources:
      - SemanticSegmentationMask:
          file_format: mrc
          glob_string: labels/{run_name}_microtubules.mrc
          is_visualization_default: true
          mask_label: 1

  - metadata:
      annotation_ingest_id: cytosolic-ribosome-1
      annotation_method: >-
        Ribosomes were segmented using DeePiCt with the model ribo_model2_IF4_D2_0.
        Results were inspected in Amira 2021.1 to remove false positives.
      annotation_object:
        id: GO:0022626
        name: cytosolic ribosome
      annotation_publications: 10.1016/j.devcel.2024.12.002
      annotation_software: DeePiCt, Amira 2021.1
      authors: *annotation_authors
      dates: *dates
      ground_truth_status: true
      is_curator_recommended: true
      method_links:
        - custom_name: DeePiCt
          link: https://github.com/ZauggGroup/DeePiCt
          link_type: source_code
        - custom_name: Amira
          link: https://www.thermofisher.com/ch/en/home/electron-microscopy/products/software-em-3d-vis/amira-software.html
          link_type: website
      method_type: hybrid
      version: 1.0
    sources:
      - SemanticSegmentationMask:
          file_format: mrc
          glob_string: labels/{run_name}_ribosomes.mrc
          is_visualization_default: true
          mask_label: 1

  - metadata:
      annotation_ingest_id: membrane-1
      annotation_method: >-
        Membranes were segmented using DeePiCt with the model full_vpp_memb_model_IF4_D2_BN.
        Results were inspected in Amira 2021.1 to remove false positives.
      annotation_object:
        id: GO:0016020
        name: membrane
      annotation_publications: 10.1016/j.devcel.2024.12.002
      annotation_software: DeePiCt, Amira 2021.1
      authors: *annotation_authors
      dates: *dates
      ground_truth_status: true
      is_curator_recommended: true
      method_links:
        - custom_name: DeePiCt
          link: https://github.com/ZauggGroup/DeePiCt
          link_type: source_code
        - custom_name: Amira
          link: https://www.thermofisher.com/ch/en/home/electron-microscopy/products/software-em-3d-vis/amira-software.html
          link_type: website
      method_type: hybrid
      version: 1.0
    sources:
      - SemanticSegmentationMask:
          file_format: mrc
          glob_string: labels/{run_name}_membranes.mrc
          is_visualization_default: true
          mask_label: 1

  - metadata:
      annotation_ingest_id: pericentriolar-material-1
      annotation_method: >-
        Denoised tomograms were used for matrix segmentation. Centrioles, microtubules, ribosomes and membranes were
        masked in the tomogram volumes. Two models were generated following manual annotation using Ilastik 1.3.3: one
        utilized 3D Pixel Classification, while the other used 2D Autocontext trained on the central 50 XY slices. The
        Autocontext model outputs were combined and binarized in MATLAB 2019a to obtain the final matrix model.
      annotation_object:
        id: GO:0000242
        name: pericentriolar material
      annotation_publications: 10.1016/j.devcel.2024.12.002
      annotation_software: Ilastik 1.3.3, MATLAB 2019a
      authors: *annotation_authors
      dates: *dates
      ground_truth_status: true
      is_curator_recommended: true
      method_links:
        - custom_name: Ilastik
          link: https://www.ilastik.org/
          link_type: website
        - custom_name: MATLAB
          link: https://www.mathworks.com/products/matlab.html
          link_type: website
      method_type: hybrid
      version: 1.0
    sources:
      - SemanticSegmentationMask:
          file_format: mrc
          glob_string: labels/{run_name}_matrix.mrc
          is_visualization_default: true
          mask_label: 1

collection_metadata:
  - sources:
      - source_glob:
