datasets:
  - metadata:
      assay:
        id: EFO:0002909
        name: microscopy assay
      authors: *annotation_authors
      cell_component:
        id: GO:0005813
        name: centrosome
      cell_strain:
        name: JWW69
      cell_type:
        id: WBbt:0007028
        name: embryonic cell
      cross_references: &cross_refs
        publications: 10.1016/j.devcel.2024.12.002
        related_database_entries: EMPIAR-12049, EMD-19778, EMD-19779, EMD-19780, EMD-19781
      dataset_description: >-
        Cryo-electron tomography data of centrosomes in dissociated C. elegans embryonic cells across the cell cycle.
        Centrosomes were visualized in cells isolated from early-stage embryos (strain JWW69 expressing GFP::SPD-5 and
        H2B::mCherry). Cells were plunge-frozen, thinned by cryo-FIB milling, and imaged on a 300 kV Titan Krios with
        a K2 Summit detector, Volta phase plate, and energy filter. 12 tomograms were collected at centrosomes in
        interphase, prophase, metaphase, anaphase, and telophase stages. Comprehensive annotations of centrioles,
        microtubules, ribosomes, membranes, and pericentriolar material are provided. Tilt series were aligned using
        patch tracking in IMOD, and tomograms were reconstructed using weighted back projection in Warp.
      dataset_identifier: 10477
      dataset_title: Cryo-electron tomography of centrosomes in C. elegans embryonic cells
      dates: *dates
      development_stage:
        id: WBls:0000003
        name: embryo Ce
      disease:
        id: PATO:0000461
        name: normal
      funding:
        - funding_agency_name: Cancer Prevention Research Institute of Texas (CPRIT)
          grant_id: RR170063
        - funding_agency_name: Welch Foundation
          grant_id: I-2052-20200401
        - funding_agency_name: National Institute of General Medical Sciences (NIGMS/NIH)
          grant_id: 1R35GM142522
        - funding_agency_name: National Institutes of Health (NIH)
          grant_id: T32 GM007062
        - funding_agency_name: European Research Council (ERC)
          grant_id: 3DCellPhase-760067
        - funding_agency_name: EMBL
        - funding_agency_name: Endowed Scholars program at UT Southwestern
      grid_preparation: >-
        Quantifoil Holey SiO2 R 1/4 Au 200 mesh EM grids were glow discharged on both sides (Pelco easyglow, 45 s,
        0.37 mBar, 15 mA). 4 ul of cell suspension was added to the front of the grid, 2 ul of supplemented L-15
        media to the back. Grids were blotted from the back for 3 s and plunge-frozen in liquid ethane at -185 C using
        a Leica EM GP2 (chamber: 22 C, 70% humidity). Cryo-FIB milling was performed on a dual beam Aquilos1
        (ThermoFisher Scientific) at 30 kV with sequential milling currents (1 nA, 500 pA, 300 pA, 100 pA fine
        milling). Lamellae were milled at 20 degree stage tilt with 45 degree pretilt shuttle. 300 nm micro-expansion
        joints were milled on both sides.
      organism:
        name: Caenorhabditis elegans
        taxonomy_id: 6239
      sample_preparation: >-
        Cells were isolated from early-stage C. elegans embryos (strain JWW69 expressing GFP::SPD-5 and
        H2B::mCherry). Gravid adults were bleached to collect embryos. Embryos were treated with chitinase (4 mg/ml)
        in modified L-15 media for 15 min, followed by mechanical dissociation and accutase treatment. Cells were
        filtered through 20 um and 10 um cell strainers.
      sample_type: primary_cell_culture
    sources:
      - literal:
          value:
            - "10477"

