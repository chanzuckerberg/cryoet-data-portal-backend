      dataset_identifier: 10509
      dataset_title: Cryo-ET of cryo-FIB-milled Rickettsia parkeri wild-type bacteria (2.4 A, UW-Madison K3)
      dataset_description: |
        Aligned cryo-electron tilt series and tomograms of purified wild-type Rickettsia parkeri
        (GFPAa, strain Portsmouth) thinned by cryo-focused-ion-beam (cryo-FIB) milling at the Stanford-SLAC
        CryoET Specimen Preparation Center (SCSC). Imaged on a Titan Krios (300 kV) with a K3 detector and
        Gatan energy filter at the UW-Madison MCCET, ~2.4 A pixel size, dose-symmetric tilt scheme with 3
        degree increment and ~100 e/A2 total dose. Tomograms were aligned marker-free with AreTomo2 and
        reconstructed in RELION 5 (CTF-corrected, binned to ~10 A), resolving a repetitive slanted lattice-like
        S-layer located ~14 nm from the outer membrane.
      cross_references:
        publications: 10.17912/micropub.biology.002219
      assay:
        name: microscopy assay
        id: EFO:0002909
      organism:
        name: Rickettsia parkeri
        taxonomy_id: 35792
      sample_type: primary_cell_culture
      cell_type:
        name: prokaryotic cell
        id: CL:0000520
      cell_strain:
        name: Rickettsia parkeri str. Portsmouth
        id: NCBITaxon:1105108
      cell_component:
        name: outer membrane
        id: GO:0019867
      tissue:
        name: prokaryotic cell
        id: CL:0000520
      development_stage:
        name: unknown
        id: unknown
      disease:
        name: normal
        id: PATO:0000461
      grid_preparation: |
        Bacterial-lawn grids were prepared as for the purified-bacteria samples: holey-carbon grids (Quantifoil R2/1 200
        mesh Cu/Au or R1/2 200 mesh Au) glow-discharged 10 s at 15 mA (Pelco easiGlow), 7 uL of purified R. parkeri
        GFPAa bacteria applied (split blot), and plunge-frozen in liquid ethane on a Leica EM GP2. Grids were then
        transferred to the Stanford-SLAC CryoET Specimen Preparation Center (SCSC) and loaded into an Aquilos 2
        cryo-FIB (ThermoFisher). Lamellae were milled with a 30 kV focused gallium ion beam: grids were sputter-coated
        with metallic Pt, GIS organometallic-Pt coated (1 min), then sputter-coated again with metallic Pt. AutoTEM 5
        (ThermoFisher) determined the milling angle; lamellae were milled to ~200 nm (rough 500 pA, polish 30 pA),
        with stress-relief cuts to limit breakage.
      sample_preparation: |
        Rickettsia parkeri strain Portsmouth was obtained from C. Paddock (CDC). Fluorescent wild-type R. parkeri GFPAa
        was generated by electroporation of the pRAM18dR-GFPAa shuttle vector into Vero-cell-derived bacteria followed
        by rifampicin selection (500 ng/mL), as in Bacher et al. 2026. Bacteria were propagated by infecting confluent
        Vero cells (ATCC CCL-81, CVCL_0059) for 4-7 days at 33 C, harvested, Dounce-homogenized in K36 buffer, isolated
        by 30% RenoCal-76 density centrifugation, resuspended in BHI medium and stored at -80 C as a 30% prep stock.
      other_setup: |
        Cryo-FIB milling; purified whole R. parkeri, wild-type (GFPAa).
