alignments:
- sources:
  - destination_glob:
      list_glob: '{run_output_path}/Alignments/100/alignment_metadata.json'
      match_regex: .*
      name_regex: (.*)
annotations:
- metadata:
    annotation_ingest_id: cytosolic-ribosome-1
    annotation_method: manual particle picking using the copick-toolkit
    annotation_object:
      id: GO:0022626
      name: cytosolic ribosome
    annotation_software: chimerax-copick 1.4.1
    authors: &id001
    - ORCID: 0009-0003-2008-9583
      name: Daniel Ji
      primary_author_status: true
    - ORCID: 0000-0002-8063-6951
      name: Jonathan Schwartz
      primary_author_status: true
    - ORCID: 0000-0003-4685-037X
      corresponding_author_status: true
      name: Utz Heinrich Ermel
      primary_author_status: false
    dates: &id002
      deposition_date: '2025-09-17'
      last_modified_date: '2025-09-17'
      release_date: '2025-09-17'
    ground_truth_status: true
    is_curator_recommended: true
    method_links:
    - custom_name: Copick on GitHub
      link: https://github.com/copick/copick
      link_type: source_code
    - custom_name: ChimeraX-copick on GitHub
      link: https://github.com/copick/chimerax-copick
      link_type: source_code
    - custom_name: Copick documentation
      link: https://copick.github.io/copick/
      link_type: source_code
    method_type: manual
    version: 1.0
  sources:
  - Point:
      binning: 8.66
      columns: xyz
      file_format: copick
      glob_string: '{dataset_name}/ExperimentRuns/{run_name}/Picks/daniel.ji_1_ribosome.json'
      is_visualization_default: false
- metadata:
    annotation_ingest_id: cytosolic-ribosome-2
    annotation_method: "octopi particle prediction \u2192 RELION 5 subtomogram averaging\
      \ and classification"
    annotation_object:
      id: GO:0022626
      name: cytosolic ribosome
    annotation_software: octopi 1.2.0
    authors: *id001
    dates: *id002
    ground_truth_status: false
    is_curator_recommended: true
    method_links:
    - custom_name: Octopi on GitHub
      link: https://github.com/chanzuckerberg/octopi
      link_type: source_code
    - custom_name: Octopi documentation
      link: https://chanzuckerberg.github.io/octopi/
      link_type: documentation
    - custom_name: RELION on GitHub
      link: https://github.com/3dem/relion
      link_type: source_code
    method_type: automated
    version: 1.0
  sources:
  - OrientedPoint:
      binning: 8.66
      file_format: copick
      glob_string: '{dataset_name}/ExperimentRuns/{run_name}/Picks/relion_10426-41_ribosome.json'
      is_visualization_default: true
      mesh_source_path: '{dataset_name}/mesh/ribosome.glb'
datasets:
- sources:
  - source_glob:
      list_glob: '10426'
      match_regex: .*
      name_regex: (.*)
deposition_keyphotos:
- sources:
  - literal:
      value:
        snapshot: cryoetportal-rawdatasets-dev/deposition_key_photos/deposition_10333_snapshot.png
        thumbnail: cryoetportal-rawdatasets-dev/deposition_key_photos/deposition_10333_thumbnail.png
depositions:
- metadata:
    authors: *id001
    dates: *id002
    deposition_description: "This deposition provides manual and automated annotations\
      \ of cytosolic ribosomes in cryo-electron tomograms of unroofed human cells.\
      \ Manual annotations were created using the copick-toolkit and used to train\
      \ an octopi object detection model. The trained model was used to localize candidate\
      \ particles, which were then subjected to subtomogram averaging and classification\
      \ using RELION 5.0. The final set of automated annotations is the set of particles\
      \ that contributed to the highest-quality ribosome average (7.5 \xC5 final resolution)."
    deposition_identifier: 10333
    deposition_title: Training annotations and octopi predictions of ribosomes in
      unroofed human cells
    deposition_types:
    - annotation
  sources:
  - literal:
      value:
      - 10333
runs:
- sources:
  - source_glob:
      list_glob: '{dataset_name}/ExperimentRuns/*'
      match_regex: .*
      name_regex: (.*)
standardization_config:
  deposition_id: 10333
  source_prefix: CZII/20250916_unroofing_ribosomes/
version: 1.3.0
voxel_spacings:
- sources:
  - destination_glob:
      list_glob: '{run_output_path}/Reconstructions/VoxelSpacing*'
      match_regex: .*
      name_regex: VoxelSpacing(.*)
