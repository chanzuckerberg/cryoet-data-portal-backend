      value:
        snapshot: cryoetportal-rawdatasets-dev/deposition_key_photos/deposition_10328_snapshot.png
        thumbnail: cryoetportal-rawdatasets-dev/deposition_key_photos/deposition_10328_thumbnail.png
depositions:
- metadata:
    authors: *id001
    dates: *id002
    deposition_description: The 10th place solution employs an ensemble of nine 3D
      UNets, pretrained on simulated data and finetuned on competition data, using
      a combination of Tversky loss and multiclass cross-entropy as the training objective.
      Predictions are merged by averaging logits equally across models, followed by
      thresholding to obtain detection regions and a custom KL-divergence based postprocessing
      approach to separate multiple particles detected within a single region. The
      solution achieves distinction through its postprocessing method that identifies
      particle centers by optimally placing theoretical particle probability density
      functions to minimize KL divergence with predicted density functions, further
      refined by using circumcenters of randomly selected boundary points to improve
      centroid predictions.
    deposition_identifier: 10328
    deposition_title: CZII CryoET Object Identification Challenge - 10th place solution
      - Josef Slavicek
    deposition_types:
    - annotation
    tag: competitionML2024Winners
  sources:
  - literal:
      value:
      - 10328
