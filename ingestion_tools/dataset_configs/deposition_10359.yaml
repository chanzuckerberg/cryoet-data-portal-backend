    annotation_ingest_id: membrane-membrain-seg-1
    annotation_method: Automated membrane segmentation with MemBrain-seg (v10 model)
      applied to the IsoNet-denoised tomograms at 10 A.
    annotation_object:
      id: GO:0016020
      name: membrane
    annotation_software: MemBrain-seg
