alignments:
- metadata:
    alignment_type: LOCAL
    format: ARETOMO3
    is_portal_standard: true
    method_type: fiducial_based
    tilt_offset: 0
    x_rotation_offset: 0
  sources:
  - source_glob:
      list_glob: reprocessed/alignments/{mapped_tilt_series_name}.aln
annotations:
