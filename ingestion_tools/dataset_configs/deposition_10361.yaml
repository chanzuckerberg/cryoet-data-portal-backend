# Deposition 10361 - Boundary "valid-sample" ground-truth specimen-boundary annotations
# into 16 existing CryoET Data Portal datasets (single multi-dataset deposition config).

version: 1.3.0
annotations:
- metadata:
    annotation_ingest_id: valid-sample-mesh-1
    annotation_method: >-
      Ground-truth valid-sample specimen boundary (triangular mesh). Manual top/bottom-layer picks
      (ArtiaX) delimiting the specimen slab surfaces were converted to a smooth watertight slab mesh
      with copick: a spline surface was fit to the manual picks (picks2slab) and intersected with the
      per-run valid-reconstruction-area box (meshop intersection), yielding a slab (curved top +
      parallel bottom + side walls) approximating the valid biological specimen volume.
    annotation_object: &object
      id: CDPO:0000001
      name: sample
      description: Valid biological specimen volume.
    annotation_software: copick
    authors: &authors
    - name: Utz Heinrich Ermel
      ORCID: 0000-0003-4685-037X
      email: utz.ermel@biohub.org
      primary_author_status: true
      corresponding_author_status: true
    dates: &dates
      deposition_date: '2026-07-14'
      last_modified_date: '2026-07-14'
      release_date: '2026-07-14'
    ground_truth_status: true
    method_type: hybrid
    method_links: &method_links
    - custom_name: copick on GitHub
      link: https://github.com/copick/copick
      link_type: source_code
    - custom_name: copick sample_boundaries tutorial
      link: https://copick.github.io/copick/examples/tutorials/sample_boundaries/
      link_type: documentation
    version: 1.0
  sources:
  - TriangularMesh:
      file_format: glb
      glob_string: deposit/ExperimentRuns/{deposit_dir}/Meshes/meshop_0_valid-sample.glb
      is_visualization_default: false
      scale_factor: 1.0
- metadata:
    annotation_ingest_id: valid-sample-segmentation-1
    annotation_method: >-
      Ground-truth valid-sample specimen boundary as a semantic segmentation mask (label 1 = valid
      sample). The boundary slab (see the companion valid-sample mesh annotation) was rasterized to a
      voxel mask with copick (mesh2seg). Where the mask was generated at a coarser voxel spacing than
      the native portal tomogram it is rescaled to the native tomogram grid on ingest.
    annotation_object: *object
    annotation_software: copick
    authors: *authors
    dates: *dates
    ground_truth_status: true
    method_type: hybrid
    method_links: *method_links
    version: 1.0
  sources:
  # mask voxel spacing == native tomogram spacing -> attach as-is
  - SemanticSegmentationMask:
      file_format: zarr
      glob_string: deposit/ExperimentRuns/{deposit_dir}/Segmentations/*_mesh2seg_0_valid-sample.zarr
      is_visualization_default: false
      mask_label: 1
    parent_filters:
      include:
        dataset:
        - '10001'
        - '10006'
        - '10007'
        - '10301'
        - '10302'
        - '10430'
        - '10477'
        - '10479'
        - '10498'
        - '10510'
  # mask generated at 10 A -> rescale to the native portal tomogram grid
  - SemanticSegmentationMask:
      file_format: zarr
      glob_string: deposit/ExperimentRuns/{deposit_dir}/Segmentations/*_mesh2seg_0_valid-sample.zarr
      is_visualization_default: false
      mask_label: 1
      rescale: true
    parent_filters:
      include:
        dataset:
        - '10458'
        - '10461'
        - '10473'
        - '10474'
        - '10475'
        - '10476'
datasets:
- sources:
  - literal:
      value:
      - '10001'
      - '10006'
      - '10007'
      - '10301'
      - '10302'
      - '10430'
      - '10458'
      - '10461'
      - '10473'
      - '10474'
      - '10475'
      - '10476'
      - '10477'
      - '10479'
      - '10498'
      - '10510'
depositions:
- metadata:
    authors: *authors
    dates: *dates
    deposition_description: >-
      Ground-truth specimen-boundary annotations for 16 in-situ / plunge-frozen cryo-ET
      datasets, deposited in two representations: a watertight triangular-mesh slab and a
      semantic segmentation mask. Each boundary approximates the valid biological specimen
      volume and was built from manual top/bottom-layer annotations (spline slab fit + intersection with
      the per-run valid-reconstruction-area box) using copick. These boundaries mark where valid
      sample sits in each tomogram (sample vs vacuum/embedding) and can be used to constrain particle
      picking to the specimen interior.
    deposition_identifier: 10361
    deposition_title: Ground-truth specimen-boundary annotations across FIB-milled and plunge-frozen samples
    deposition_types:
    - annotation
  sources:
  - literal:
      value:
      - 10361
runs:
- sources:
  - destination_glob:
      list_glob: '{dataset_output_path}/*'
      match_regex: .*
      name_regex: (.*)
    exclude:
    - Images
    - dataset_metadata.json
standardization_config:
  deposition_id: 10361
  run_data_map_file: run_to_data_map.tsv
  source_prefix: CZII/20260714_boundary_annotations/
