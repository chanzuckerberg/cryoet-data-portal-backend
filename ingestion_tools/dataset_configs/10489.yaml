datasets:
  - metadata:
      authors: *authors
      dates: *dates
      dataset_identifier: 10489
      dataset_title: Vibrio cholerae competence pilus - PilT and PilU inactive variants
      dataset_description: |
        This dataset was collected to study the Vibrio cholerae competence pilus (CP) in the presence of both PilT and PilU inactive versions. The cells are over-expressing the CP machine in presence of IPTG. Other pilus machines (TCP, toxin-coregulated pilus; MSHA, mannose-sensitive hemagglutinin) have been deleted.
      assay:
        name: microscopy assay
        id: EFO:0002909
      cell_type:
        name: prokaryotic cell
        id: CL:0000520
      cell_strain:
        name: Vibrio cholerae O1 biovar El Tor str. N16961
        id: NCBITaxon:243277
      development_stage:
        name: unknown
        id: unknown
      disease:
        name: normal
        id: PATO:0000461
      organism:
        name: Vibrio cholerae
        taxonomy_id: 243277
      tissue:
        name: prokaryotic cell
        id: CL:0000520
      sample_type: primary_cell_culture
      sample_preparation: |
        Cells grown overnight in LB plus 10 mM CaCl2/20 mM MgCl2/0.1 mM IPTG at 30C + 10 uL overnight culture plated on a LB plus 10mM CaCl2/20 mM MgCl2/0.1 mM IPTG/agar plate + Grown overnight at 30C + Cells were collected with a pipette tip and resuspended in 100 uL resuspension buffer (7 gL-1 aquarium salt, 10 mM Tris-HCl pH 7.4 100 mgmL-1 Lysine) per 5 mg cells.
      grid_preparation: |
        Cu Quantifoils R2/2 + 10 nm gold beads + Frozen in Vitrobot at 100% humidity, blot time 8s, blot force 8.
      other_setup: |
        Genotype : rpoS*, pilA S81C, lacZ::lacIq, comEA-mCherry, ΔluxO, Ptac-tfoX, Ptac- recA, ∆TCP::ZeoR, ∆MSHA::CarbR, ∆CTX::KanR, pilT136A::TmR, pilUK133A
      cross_references:
        publications: 10.1101/2025.04.23.650258
    sources:
      - literal:
          value:
            - "10489"

