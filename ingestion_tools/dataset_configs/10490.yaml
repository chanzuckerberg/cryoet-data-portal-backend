      annotation_method: &cs_anno_method_pts Simulated particles split from the lumped ground-truth instance segmentation. Orientation is not provided for this membrane-associated class.
      annotation_software: &cs_software cryo-TomoSim (CTS)
      annotation_publications: &cs_pub 10.1101/2025.11.11.687379, 10.1101/2023.04.28.538636
