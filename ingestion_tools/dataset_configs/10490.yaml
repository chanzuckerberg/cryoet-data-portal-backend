          is_visualization_default: true

  # Note: gts/semantic/{run_name}.mrc (the fine ~149-class semantic mask) is
  # intentionally not ingested as a portal annotation. Without a per-class
  # mask_label split it would render as a single lumped annotation, which is
  # redundant with the per-class breakdown above (membrane / particles /
  # microtubule / actin / dna-rna) plus the per-particle instance segmentation
  # below.

  - metadata:
      annotation_ingest_id: cryosiam-instance-segmentation-1
      annotation_object:
        id: GO:0032991
        name: protein-containing complex
      annotation_method: >-
        Per-voxel ground-truth instance segmentation mask emitted by a modified version
        of CTS that records, in addition to the semantic class, a unique integer ID
        per individual particle placed in the volume. Per-particle spatial coordinates
        and volume measurements are exported to gts/instance_stats/stats_sample_*.csv.
      annotation_software: cryo-TomoSim (CTS, modified by the cryoSiam authors)
      annotation_publications: 10.1101/2025.11.11.687379
      method_type: simulated
      ground_truth_status: true
      version: 1.0
      authors: *id_authors
      dates: *id_dates
      method_links: *id_method_links
    sources:
      - InstanceSegmentationMask:
          file_format: mrc
          glob_string: gts/instance/{run_name}.mrc
          rescale: false
          is_visualization_default: false

