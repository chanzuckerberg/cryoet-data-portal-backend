datasets:
  - metadata:
      dataset_identifier: 10490
      dataset_title: >-
        CryoSiam general training dataset - simulated cryo-electron tomograms of cellular molecular crowding
      dataset_description: >-
        Synthetic cryo-electron tomography dataset of 300 simulated tomograms of
        generic cellular molecular crowding, generated for the CryoSiam
        self-supervised representation-learning framework (Stojanovska et al.,
        bioRxiv 2025.11.11.687379). The cryo-TomoSim (CTS) simulator placed 141
        PDB-derived macromolecular structures (10 kDa to >4 MDa), membrane vesicles
        and embedded complexes, cytosolic distractor proteins, actin filaments, and
        microtubules largest-to-smallest at up to ~80% crowding to emulate in-cell
        environments. Sample thicknesses span 60-100 nm. Each run provides four
        reconstructed tomogram variants plus voxel-wise ground-truth coarse and fine
        semantic masks and per-particle instance masks with coordinate and volume
        metadata. The full structure list is in the publication's Supplementary
        Table 2.
      sample_type: in_silico
      assay:
        name: microscopy assay
        id: EFO:0002909
      development_stage:
        name: unknown
        id: unknown
      disease:
        name: normal
        id: PATO:0000461
      authors: *id_authors
      funding: &id_funding
        - funding_agency_name: Independent Research Fund Denmark
          grant_id: 0164-00010A
        - funding_agency_name: European Commission, Horizon 2020 (Marie Skłodowska-Curie Actions, ARISE fellowship)
          grant_id: "945405"
        - funding_agency_name: European Molecular Biology Laboratory
          grant_id: EMBL core funding
        - funding_agency_name: European Molecular Biology Laboratory
          grant_id: EMBL Infection Biology Transversal Theme Synergy grant
        - funding_agency_name: Chan Zuckerberg Initiative
          grant_id: 2021-234620
      cross_references: &id_cross_references
        publications: 10.1101/2025.11.11.687379
        related_database_entries: >-
          EMPIAR-10499, EMPIAR-11756,
          PDB-12GS, PDB-1BXN, PDB-1EXR, PDB-1G3I, PDB-1N9G, PDB-1QTX, PDB-1QVR,
