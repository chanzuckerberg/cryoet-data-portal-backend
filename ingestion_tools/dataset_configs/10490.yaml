datasets:
  - metadata:
      dataset_identifier: 10490
      dataset_title: >-
        CryoSiam general training dataset - simulated cryo-electron tomograms of cellular molecular crowding
      dataset_description: >-
        Synthetic cryo-electron tomography dataset comprising 300 simulated tomograms
        of generic cellular molecular crowding, generated for training and evaluating
        the CryoSiam self-supervised representation-learning framework (Stojanovska et
        al., bioRxiv 2025.11.11.687379). Tomograms were produced with the cryo-TomoSim
        (CTS) simulator using 141 PDB-derived macromolecular structures spanning 10 kDa
        to >4000 kDa together with membranous vesicles, membrane-embedded complexes,
        smaller cytosolic complexes (distractors), actin filaments, and microtubules.
        Particles were placed largest-to-smallest with brute-force model filling,
        achieving up to 80% crowding density to mimic realistic in-cell environments.
        Sample thicknesses range 60-100 nm. For each run the deposit contains a clean
        tilt series and a noisy CTF-modulated tilt series (300 kV, 6.8 Å/pixel,
        tilt range -60° to +60° in 2° increments, 61 tilts, 120 e-/Å² total dose,
        2-5 µm defocus, amplitude contrast 2.7, additive Gaussian noise σ = 0.2),
        reconstructed via weighted back-projection (IMOD) into clean, noisy,
        CTF-corrected (phase-flipped) and CryoSiam-denoised tomograms (XY 600x600,
        variable Z). Voxel-wise semantic segmentation masks (background, membranes,
        microtubules, actin, DNA/RNA filaments, particle classes) and instance
        segmentation masks with per-particle coordinates and volume metadata are
        provided as ground truth. Full list of ~141 PDB-derived structures used by the
        simulator is in gts/semantic_classes_ids.dat and Supplementary Table 2 of the
        source publication; cross_references.related_database_entries lists only a
        representative subset.
      sample_type: in_silico
      assay:
        name: microscopy assay
        id: EFO:0002909
      development_stage:
        name: unknown
        id: unknown
      disease:
        name: normal
        id: PATO:0000461
      authors: *id_authors
      funding: &id_funding
        - funding_agency_name: Independent Research Fund Denmark
          grant_id: 0164-00010A
        - funding_agency_name: European Commission, Horizon 2020 (Marie Skłodowska-Curie Actions, ARISE fellowship)
          grant_id: "945405"
        - funding_agency_name: European Molecular Biology Laboratory
          grant_id: EMBL core funding
        - funding_agency_name: European Molecular Biology Laboratory
          grant_id: EMBL Infection Biology Transversal Theme Synergy grant
        - funding_agency_name: Chan Zuckerberg Initiative
          grant_id: 2021-234620
      cross_references: &id_cross_references
        publications: 10.1101/2025.11.11.687379
        # Representative subset of the ~141 PDB-derived structures used by the
        # CTS simulator. Full list in gts/semantic_classes_ids.dat (deposited
        # alongside the data) and Supplementary Table 2 of the source publication.
        related_database_entries: >-
          EMPIAR-10499, EMPIAR-11756,
          PDB-1BXN, PDB-1MWS, PDB-1SS8, PDB-1ZBB, PDB-2CG9, PDB-2Q0U,
          PDB-4CR2, PDB-4UJD, PDB-4V4R, PDB-4V5C, PDB-5FMG, PDB-5OOL,
          PDB-5OXV, PDB-6KS8, PDB-6X9Q, PDB-7PEY
        related_database_links: >-
          https://github.com/frosinastojanovska/cryosiam,
          https://github.com/frosinastojanovska/cryosiam_vis,
          https://cryoetdataportal.czscience.com/datasets/10003,
          https://cryoetdataportal.czscience.com/datasets/10301
      dates: *id_dates
      grid_preparation: >-
        Not applicable - purely synthetic dataset generated in silico via the
        cryo-TomoSim (CTS) simulator. No physical grid preparation was performed.
      sample_preparation: >-
        Tomograms were simulated with cryo-TomoSim (CTS; Purnell et al., bioRxiv
        2023.04.28.538636), generating 300 synthetic 'general' tomograms. Each volume
        was populated with 141 PDB-derived macromolecular structures (Supplementary
        Table 2 of the source publication; see gts/semantic_classes_ids.dat for the
        canonical class list deposited alongside the data), spanning molecular weights
        from ~10 kDa (e.g. 7ELY peptide, 1EXR/1QTX calmodulin) to >4000 kDa (e.g. 4UJD
        mammalian 80S ribosome, 5MRC yeast mitochondrial ribosome, 6X9Q
        transcription-translation complex), together with membranous vesicles and
        membrane-embedded complexes (S-layers, BAM, GPCRs, GABA-A R, NMDA R, mGluR5,
        5-HT3), smaller cytosolic complexes serving as distractors (calmodulin, GST,
        alpha-actinin), actin filaments, and microtubules. Particles were sequentially
        placed from largest to smallest using brute-force model filling, up to a
        crowding density of ~80% to emulate realistic in-cell environments. Sample
        thicknesses ranged 60-100 nm. Each 3D structural model was projected into a
        CTF-modulated synthetic tilt series (acquisition parameters in tiltseries
        metadata). Both the clean (unmodulated) and noisy (CTF-modulated) tilt series
        were independently reconstructed into 3D tomograms via weighted back-projection
        (WBP) in IMOD. The CTS source code was modified to additionally export
        per-particle instance masks, spatial coordinates, and volume measurements,
        yielding voxel-wise semantic masks (background, membranes, microtubules, actin,
        DNA/RNA filaments, particle classes) and instance masks alongside the
        tomograms. Tomogram XY dimensions are 600x600 voxels; Z varies per run.
      other_setup: In silico simulation (CTS pipeline; CryoETSim general subset)
    sources:
      - literal:
          value:
            - "10490"

