version: 1.0.0

annotations:
  - metadata:
      annotation_ingest_id: cryosiam-semantic-general-membrane-1
      annotation_object:
        id: GO:0016020
        name: membrane
        description: Lipid-bilayer membranes (vesicles, membrane-embedded complexes).
      annotation_method: &id_anno_method >-
        Per-voxel ground-truth semantic mask emitted by the CTS (cryo-TomoSim)
        simulator alongside the tomogram. Class index per voxel maps 1:1 to a
        line in gts/semantic_general_classes_ids.dat (1=membrane, 2=particles,
        3=microtubules, 4=actin, 5=dna/rna filaments); voxel value 0 is
        background. The per-class label for this entry is given by the
        source's mask_label.
      annotation_software: cryo-TomoSim (CTS)
      annotation_publications: 10.1101/2025.11.11.687379
      method_type: simulated
      ground_truth_status: true
      version: 1.0
      authors: &id_authors
        - name: Frosina Stojanovska
          ORCID: 0000-0002-4327-1068
          primary_author_status: true
          corresponding_author_status: true
          affiliation_name: European Molecular Biology Laboratory
        - name: Ricardo M. Sanchez
          ORCID: 0000-0002-2854-0119
          primary_author_status: false
          corresponding_author_status: false
          affiliation_name: European Molecular Biology Laboratory
        - name: Rasmus K. Jensen
          ORCID: 0000-0001-5472-4862
          primary_author_status: false
          corresponding_author_status: false
          affiliation_name: European Molecular Biology Laboratory
        - name: Julia Mahamid
          ORCID: 0000-0001-6968-041X
          primary_author_status: false
          corresponding_author_status: true
          affiliation_name: European Molecular Biology Laboratory
        - name: Anna Kreshuk
          ORCID: 0000-0003-1334-6388
          primary_author_status: false
          corresponding_author_status: true
          affiliation_name: European Molecular Biology Laboratory
        - name: Judith B. Zaugg
          ORCID: 0000-0001-8324-4040
          primary_author_status: false
          corresponding_author_status: true
          affiliation_name: European Molecular Biology Laboratory
      dates: &id_dates
        deposition_date: "2026-05-01"
        last_modified_date: "2026-05-01"
        release_date: "2026-05-01"
      method_links: &id_method_links
        - link_type: source_code
          custom_name: cryoSiam
          link: https://github.com/frosinastojanovska/cryosiam
        - link_type: source_code
          custom_name: cryo-TomoSim (CTS)
          link: https://github.com/carsonpurnell/cryotomosim_CTS
        - link_type: website
          custom_name: CTS paper (Purnell et al. 2023)
          link: https://www.biorxiv.org/content/10.1101/2023.04.28.538636v1.full
        - link_type: source_code
          custom_name: PolymerCpp
          link: https://github.com/kmdouglass/PolymerCpp
        - link_type: other
          custom_name: PolymerCpp Zenodo (Stefko, Douglass & Manley 2020)
          link: https://zenodo.org/records/3928659
        - link_type: website
          custom_name: IMOD
          link: https://bio3d.colorado.edu/imod/
    sources:
      - SemanticSegmentationMask:
          file_format: mrc
          glob_string: gts/semantic_general/{run_name}.mrc
          mask_label: 1
          rescale: false
          is_visualization_default: true

