          https://cryoetdataportal.czscience.com/datasets/10301
      dates: *id_dates
      grid_preparation: >-
        Not applicable - purely synthetic dataset generated in silico via the
        cryo-TomoSim (CTS) simulator. No physical grid preparation was performed.
      sample_preparation: >-
        Tomograms were simulated with cryo-TomoSim (CTS; Purnell et al., bioRxiv
        2023.04.28.538636), producing 300 'general' synthetic volumes. Each was
        populated with 141 PDB-derived macromolecular structures spanning ~10 kDa to
        >4 MDa (full list in Supplementary Table 2), together with membranous
        vesicles, membrane-embedded complexes, smaller cytosolic distractor proteins,
        actin filaments, and microtubules. Particles were placed largest-to-smallest
        by brute-force model filling up to ~80% crowding to emulate in-cell
        environments. Sample thicknesses ranged 60-100 nm. Each model was projected
        into clean and CTF-modulated synthetic tilt series, independently
        reconstructed by weighted back-projection (IMOD). The CTS source was extended
        to export per-particle instance masks, coordinates, and volumes, yielding
        voxel-wise semantic and instance ground-truth masks (XY 600x600 voxels,
        variable Z).
      other_setup: In silico simulation (CTS pipeline; CryoETSim general subset)
