datasets:
- metadata:
    dataset_identifier: 10511
    dataset_title: In situ cryo-electron tomography of mitochondria in HeLa cells under mitochondrial protein-folding stress
    dataset_description: >-
      Correlated in situ cryo-electron tomography of mitochondria in cultured human HeLa cells subjected to
      mitochondrial protein-folding stress. Cells stably expressing Parkin-eGFP were grown directly on EM grids,
      treated with gamitrinib-triphenylphosphonium (GTPP) to inhibit mitochondrial Hsp90 and trigger the
      mitochondrial unfolded protein response, vitrified, and thinned by cryo-focused-ion-beam milling with
      fluorescence-guided targeting. The tomograms capture mitochondrial ultrastructure and the intramitochondrial
      Hsp60-Hsp10 (mtHsp60-Hsp10) chaperonin complex under folding stress, revealing amorphous protein aggregates
      and increased abundance and clustering of the chaperonin, alongside untreated, CCCP-treated, and
      Hsp60/Hsp10-knockdown conditions for comparison.
    authors: &authors
    - name: Mingyu Jung
      ORCID: 0009-0003-0098-5460
      affiliation_name: School of Biological Sciences, Seoul National University
      affiliation_address: Seoul 08826, Republic of Korea
      affiliation_identifier: https://ror.org/04h9pn542
      primary_author_status: true
      corresponding_author_status: false
    - name: Minjung Kim
      ORCID: 0000-0003-3519-8718
      affiliation_name: School of Biological Sciences, Seoul National University
      affiliation_address: Seoul 08826, Republic of Korea
      affiliation_identifier: https://ror.org/04h9pn542
      primary_author_status: true
      corresponding_author_status: false
    - name: Su Jin Ham
      ORCID: 0000-0001-5230-3386
      affiliation_name: School of Biological Sciences, Seoul National University; Institute of Molecular Biology and Genetics, Seoul National University
      affiliation_address: Seoul 08826, Republic of Korea
      affiliation_identifier: https://ror.org/04h9pn542
      primary_author_status: true
      corresponding_author_status: false
    - name: Jongkyeong Chung
      ORCID: 0000-0001-5894-7537
      affiliation_name: School of Biological Sciences, Seoul National University; Institute of Molecular Biology and Genetics, Seoul National University
      affiliation_address: Seoul 08826, Republic of Korea
      affiliation_identifier: https://ror.org/04h9pn542
