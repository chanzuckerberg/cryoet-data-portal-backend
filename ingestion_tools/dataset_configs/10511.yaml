depositions:
- metadata:
    deposition_identifier: 10360
    deposition_title: In situ cryo-ET of the mitochondrial Hsp60-Hsp10 chaperonin complex in HeLa cells under folding stress
    deposition_description: >-
      This deposition provides in situ cryo-electron tomography data of mitochondria in cultured human HeLa cells
      under mitochondrial protein-folding stress, together with reconstructed tomograms.
      Correlated cryo-fluorescence and cryo-FIB milling were used to target and image the intramitochondrial
      Hsp60-Hsp10 chaperonin complex, characterizing its abundance, spatial clustering, and conformational states
      (football, half-football, and bullet-like) and its engagement of unstructured substrates under folding stress
      induced by gamitrinib-triphenylphosphonium.
    deposition_types:
    - dataset
    authors: *authors
    dates: *dates
    cross_references:
      publications: 10.1126/sciadv.adw6064
      related_database_entries: EMPIAR-12894, EMD-62702, EMD-62703, EMD-62704, EMD-62711,
        EMD-62713, EMD-62714, EMD-62747, EMD-65492, EMD-65493, PDB-9L8P
