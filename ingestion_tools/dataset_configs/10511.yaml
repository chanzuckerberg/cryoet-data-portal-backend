    grid_preparation: >-
      Quantifoil 1/4 200-mesh Au grids (Quantifoil) were glow-discharged for 30 s and UV-sterilized for 1 h, then
      coated with fibronectin (50 ug/ml) for 1 h, washed three times with PBS, and placed onto 35-mm imaging dishes
      (MatTek). Approximately 150,000 cells were seeded onto the grids and allowed to adhere overnight, giving an
      optimal confluency of ~300 cells per grid; cells were then treated with 10 uM GTPP for 4 h. Hoechst 33342
      (Miltenyi Biotec) was applied before vitrification in all experiments. Five microliters of 1-um Dynabeads
      (Thermo Fisher; diluted 1:100 in PBS with 10% glycerol) were added to the grids immediately before blotting.
      Grids were single-side blotted for 5 s and vitrified using an EM GP2 (Leica Microsystems). Cryo-FIB/SEM
      milling was performed on an Aquilos 2 Cryo-FIB (Thermo Fisher Scientific); for GTPP-treated cells, 3D
      correlation targeting Parkin-eGFP puncta was achieved with the integrated fluorescence microscope of the
      Aquilos 2 and Maps 3.20 software (Thermo Fisher). To minimize charging and curtaining, Pt sputter coating
      (10 s at 10 mA) and a gas injection system (8 s per grid) were applied before milling. Lamellae were milled
      to a final thickness of 120 nm with decreasing FIB currents (0.5, 0.3, and 0.1 nA, and 50 pA) using AutoTEM
      2.4 software (Thermo Fisher).
    sample_preparation: >-
      HeLa cells stably expressing Parkin-eGFP were cultured in Dulbecco's modified Eagle's medium (Gibco)
      supplemented with 10% fetal bovine serum (Gibco), 1% penicillin/streptomycin (Gibco), and puromycin
      (1 ug/ml; Sigma-Aldrich) at 37C in a humidified 5% CO2 atmosphere; passage number was kept below 15 and
      confluence below 80%. Mitochondrial protein-folding stress was induced by treating cells with 10 uM GTPP
      (gamitrinib-triphenylphosphonium; HY-102007A, MedChemExpress) for 4 h, which inhibits mtHsp90 and triggers
      the mitochondrial unfolded protein response. Additional experimental conditions included untreated controls,
      CCCP treatment, and siRNA knockdown of Hsp60/Hsp10.
    other_setup: Cryo-FIB milling
