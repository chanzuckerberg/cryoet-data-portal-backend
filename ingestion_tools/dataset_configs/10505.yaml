depositions:
  - metadata:
      authors: *authors
      dates: *dates
      deposition_identifier: 10353
      deposition_title:
        Cryo-electron tomography of the Rickettsia parkeri cell surface reveals OmpB is required for the S-layer
      deposition_description: |
        Cryo-electron tomography study of the obligate intracellular bacterium Rickettsia parkeri (strain Portsmouth)
        imaging its cell surface to investigate the paracrystalline surface (S-)layer. Wild-type (GFPAa) and ompB-null
        (ompBSTOP::tn transposon mutant) bacteria were imaged both within infected A549 human epithelial host cells and
        as purified bacteria, including cryo-FIB-milled lamellae, on a Titan Krios at 300 kV. Tomograms reveal a
        repetitive S-layer proximal to the outer membrane in wild-type cells that is absent in the ompB mutant,
        demonstrating that the outer-membrane protein OmpB is required for S-layer formation. The deposition
        comprises tilt series and tomograms across multiple magnifications and sample-preparation conditions.
      deposition_types:
        - dataset
      cross_references:
        publications: 10.17912/micropub.biology.002219
    sources:
      - literal:
          value:
            - 10353
