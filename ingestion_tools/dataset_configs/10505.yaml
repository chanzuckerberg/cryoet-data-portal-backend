      dataset_identifier: 10505
      dataset_title: Cryo-ET of Rickettsia parkeri wild-type in infected A549 cells (3.7 A, UW-Madison K3)
      dataset_description: |
        Aligned cryo-electron tilt series and tomograms of wild-type Rickettsia parkeri (GFPAa, strain Portsmouth)
        imaged within permeabilized, glutaraldehyde-fixed infected A549 human lung epithelial host cells.
        Imaged on a Titan Krios (300 kV) with a K3 detector and Gatan energy filter at the UW-Madison MCCET,
        ~3.7 A pixel size, dose-symmetric tilt scheme with 3 degree increment and ~120 e/A2 total dose.
        Tomograms (IMOD weighted back-projection with a SIRT-like filter, binned and NAD-filtered) reveal
        the paracrystalline S-layer surrounding the bacterial outer membrane.
      cross_references:
        publications: 10.17912/micropub.biology.002219
      assay:
        name: microscopy assay
        id: EFO:0002909
      organism:
        name: Rickettsia parkeri
        taxonomy_id: 35792
      sample_type: primary_cell_culture
      cell_type:
        name: prokaryotic cell
        id: CL:0000520
      cell_strain:
        name: Rickettsia parkeri str. Portsmouth
        id: NCBITaxon:1105108
      cell_component:
        name: outer membrane
        id: GO:0019867
      tissue:
        name: prokaryotic cell
        id: CL:0000520
      development_stage:
        name: unknown
        id: unknown
      disease:
        name: normal
        id: PATO:0000461
      grid_preparation: |
        Holey-carbon grids (Quantifoil R2/1 200 mesh gold, SPI 4320G-FA) were cleaned with acetone, blotted,
        then 70% ethanol. Wild-type-sample grids were primed with 0.1% poly-L-lysine and washed with PBS,
        and cell-culture medium was added. A549 host cells were dripped onto the grids and incubated overnight
        at 37 C, 5% CO2; R. parkeri GFPAa (MOI 1-10) was then added, the grids centrifuged (300 x g, 5 min), and
        infected cells incubated 24 h at 33 C. Grids were permeabilized/fixed with 0.5% Triton X-100 + 0.25%
        glutaraldehyde in cytoskeleton buffer (10 mM MES pH 6.8, 150 mM NaCl, 5 mM EGTA, 5 mM glucose, 5 mM MgCl2)
        for 30 s, then 1 ug/ml phalloidin + 2% glutaraldehyde for >=15 min. 10 nm gold beads (EMS 25487) were
        applied as fiducials for tomogram reconstruction, and grids were plunge-frozen in liquid ethane on a
        Leica EM GP2 (4-7 s blot) and stored in liquid nitrogen.
      sample_preparation: |
        Rickettsia parkeri strain Portsmouth was obtained from C. Paddock (CDC). Fluorescent wild-type R. parkeri
        GFPAa was generated by electroporation of the pRAM18dR-GFPAa shuttle vector into Vero-cell-derived bacteria
        followed by rifampicin selection (500 ng/mL), as in Bacher et al. 2026. Bacteria were propagated by infecting
        confluent Vero cells (ATCC CCL-81, CVCL_0059) for 4-7 days at 33 C, harvested, Dounce-homogenized in K36 buffer,
        isolated by 30% RenoCal-76 density centrifugation, resuspended in BHI medium and stored at -80 C as a 30% prep
        stock. A549 human lung epithelial cells (ATCC CRM-CCL-185, CVCL_0023) were grown at 37 C, 5% CO2 in DMEM + 10%
        FBS and used as host cells for in-cell imaging.
      other_setup: |
        Whole-cell cryo-ET of intracellular R. parkeri in A549 host cells; wild-type (GFPAa).
