datasets:
- metadata:
    dataset_identifier: 10510
    dataset_title: Cryo-electron tomography of a planar cryo-FIB lift-out from adult mouse hippocampus
      CA1 spanning stratum pyramidale through stratum lacunosum-moleculare
    dataset_description: This dataset contains in situ cryo-electron tomography of vitreous adult mouse
      (C57BL/6J) hippocampal tissue, generated by a targeted cryogenic planar lift-out workflow. Acute
      sagittal brain slices were high-pressure frozen, screened by cryo-fluorescence/cryo-confocal microscopy,
      and specific sub-regions of the CA1 field of the hippocampus were targeted by plasma focused-ion-beam
      (PFIB) milling. A planar cryo-lift-out was used to excavate a lamella spanning CA1 strata (pyramidal
      layer through stratum lacunosum-moleculare / radiatum), providing a view of the apical dendrite
      network and synaptic organization not accessible by cellular cryo-ET. Tilt series were acquired
      on a Titan Krios G4 (300 kV) with a Selectris energy filter and Falcon 4i detector, and tomograms
      were reconstructed and segmented (e.g. membranes, microtubules, synaptic vesicles) to map the molecular
      landscape of hippocampal architecture in native tissue.
