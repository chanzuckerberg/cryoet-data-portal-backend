    grid_preparation: Cryogenic planar lift-out by plasma focused-ion-beam (PFIB) milling. High-pressure-frozen
      tissue carriers were screened by cryo-confocal fluorescence microscopy (Leica Stellaris 8) and CA1
      sub-regions were targeted in a Thermo Fisher Helios Hydra CX PFIB/SEM using an integrated Meteor
      (Delmic) fluorescence microscope. A planar cryo-lift-out (~60 x 350-400 um target) was excavated
      with Xe plasma, welded to an EasyLift copper-block adapter, and serial 3-5 um sections were deposited
      and welded onto 400x100 mesh TEM support grids. Lamellae were then fine-milled on an Arctis PFIB
      (AutoTEM Cryo) with Xe plasma and final Ar polishing to ~150-300 nm thickness.
    sample_preparation: Native brain tissue from adult C57BL/6J mice (Jackson Labs; 4-6 months old). After
      Schedule 1 euthanasia, hemispheres were sectioned into 100-200 um sagittal slices on a Leica VT1200S
      vibratome in carbogen-bubbled ice-cold dissection medium, and the hippocampus was isolated and kept
      in Hibernate-A with 2% B-27 on ice. Slices were stained with Hoechst 33342, excised with a 2 mm
      biopsy punch, incubated with cryoprotectant, mounted in 3 mm gold-plated copper carriers, and vitrified
      by high-pressure freezing within ~1.5-4 h postmortem.
