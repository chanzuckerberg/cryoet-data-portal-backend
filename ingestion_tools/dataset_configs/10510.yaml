depositions:
- metadata:
    deposition_identifier: 10357
    deposition_title: A generalizable and targeted molecular biopsy approach for in situ cryogenic electron
      tomography of vitreous brain tissue
    deposition_description: This deposition contains in situ cryo-electron tomography (cryo-ET) data of
      vitreous mouse brain tissue produced by a targeted molecular-biopsy workflow. Adult mouse hippocampal
      sections were preserved by high-pressure freezing, screened and targeted by cryo-fluorescence microscopy,
      and thinned to electron-transparent lamellae by xenon/argon plasma focused ion beam (PFIB) milling
      using perpendicular and planar cryo-lift-out geometries. This approach targeted sub-regions of the
      hippocampal CA1 field, spanning stratum pyramidale (CA1-sp) through stratum radiatum (CA1-sr) toward
      stratum lacunosum-moleculare, across biopsies from several adult mice. Tilt series were collected
      and reconstructed into tomograms (including CTF-deconvolved and missing-wedge post-processed variants),
      revealing synapses, synaptic vesicles, mitochondria, microtubules, ribosomes, and the apical dendrite
      cytoskeleton network. The deposition also includes membrane and cytoskeletal segmentations, together
      forming a molecular atlas of hippocampal architecture in adult mice.
    deposition_types:
    - dataset
    - tomogram
