alignments:
- metadata:
    format: ARETOMO3
    alignment_type: GLOBAL
    method_type: projection_matching
    is_portal_standard: true
  sources:
  - source_glob:
      list_glob: alignment/{run_name}/*.aln

ctfs:
- metadata:
    format: CTFFIND
  sources:
  - source_glob:
      list_glob: ctf/{run_name}/*

frames:
- metadata:
    dose_rate: float {dose_rate}
    is_gain_corrected: false
  sources:
  - source_glob:
      list_glob: frames/{run_name}/*

gains:
- sources:
  - source_glob:
      list_glob: gain/*

rawtilts:
- sources:
  - source_glob:
      list_glob: rawtlt/{run_name}/*

collection_metadata:
- sources:
